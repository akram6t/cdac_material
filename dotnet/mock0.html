            theme: {
                extend: {

                        surface: { 50: '#1a1d2e', 100: '#151827', 200: '#111422', 300: '#0c0f1a', 400: '#080b14' },
                        mint: { 400: '#34d399', 500: '#10b981', 600: '#059669' },
                        ember: { 400: '#fb923c', 500: '#f97316', 600: '#ea580c' },
                        slate2: { 300: '#cbd5e1', 400: '#94a3b8', 500: '#64748b', 600: '#475569', 700: '#334155', 800: '#1e293b' },

    <style>
        :root {
            --bg: #0c0f1a;
            --card: #151827;
            --card-hover: #1a1d2e;
            --border: #1e293b;
            --accent: #10b981;
            --accent-glow: rgba(16, 185, 129, 0.15);
            --ember: #f97316;
            --ember-glow: rgba(249, 115, 22, 0.15);
            --text: #e2e8f0;
            --muted: #64748b;
        }

        * { box-sizing: border-box; }
        body { background: var(--bg); font-family: 'Space Grotesk', sans-serif; }

        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }

        /* Animated gradient background blobs */
        .bg-blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.07;
            pointer-events: none;
            z-index: 0;
            animation: blobFloat 20s ease-in-out infinite alternate;
        }
        .bg-blob-1 { width: 600px; height: 600px; background: #10b981; top: -200px; left: -100px; }
        .bg-blob-2 { width: 500px; height: 500px; background: #f97316; bottom: -150px; right: -100px; animation-delay: -7s; }
        .bg-blob-3 { width: 400px; height: 400px; background: #06b6d4; top: 50%; left: 50%; animation-delay: -14s; }

        @keyframes blobFloat {
            0% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -40px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.95); }
            100% { transform: translate(10px, -10px) scale(1.05); }
        }

        /* Modal overlay */
        .modal-overlay {
            backdrop-filter: blur(12px);
            background: rgba(8, 11, 20, 0.85);
        }

        /* Start button glow pulse */
        .btn-glow {
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        .btn-glow::before {
            content: '';
            position: absolute;
            inset: -2px;
            background: linear-gradient(135deg, #10b981, #06b6d4, #10b981);
            border-radius: inherit;
            z-index: -1;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .btn-glow:hover::before { opacity: 1; }
        .btn-glow:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(16, 185, 129, 0.3); }
        .btn-glow:active { transform: translateY(0); }

        /* Question card */
        .q-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .q-card:hover {
            border-color: #334155;
            box-shadow: 0 4px 24px rgba(0,0,0,0.3);
        }
        .q-card.answered-correct { border-color: #059669; box-shadow: 0 0 20px rgba(16, 185, 129, 0.08); }
        .q-card.answered-wrong { border-color: #dc2626; box-shadow: 0 0 20px rgba(220, 38, 38, 0.08); }

        /* Option styling */
        .option-btn {
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid #1e293b;
            border-radius: 12px;
            padding: 12px 16px;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            color: #cbd5e1;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.925rem;
            line-height: 1.5;
            position: relative;
            overflow: hidden;
        }
        .option-btn:hover:not(.disabled) {
            background: rgba(30, 41, 59, 0.9);
            border-color: #475569;
            transform: translateX(4px);
        }
        .option-btn.selected {
            background: var(--accent-glow);
            border-color: #10b981;
            color: #34d399;
        }
        .option-btn.correct-reveal {
            background: rgba(16, 185, 129, 0.12);
            border-color: #10b981;
            color: #34d399;
        }
        .option-btn.wrong-reveal {
            background: rgba(220, 38, 38, 0.1);
            border-color: #dc2626;
            color: #fca5a5;
        }
        .option-btn.disabled { cursor: default; opacity: 0.7; }
        .option-btn.disabled:hover { transform: none; }

        /* Option label badge */
        .opt-label {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            border-radius: 8px;
            background: rgba(100, 116, 139, 0.15);
            font-family: 'JetBrains Mono', monospace;
            font-weight: 600;
            font-size: 0.8rem;
            margin-right: 12px;
            flex-shrink: 0;
            transition: all 0.2s;
        }
        .option-btn.selected .opt-label { background: rgba(16, 185, 129, 0.25); color: #34d399; }
        .option-btn.correct-reveal .opt-label { background: rgba(16, 185, 129, 0.25); color: #34d399; }
        .option-btn.wrong-reveal .opt-label { background: rgba(220, 38, 38, 0.25); color: #fca5a5; }

        /* Show answer button */
        .show-answer-btn {
            background: transparent;
            border: 1px solid #334155;
            border-radius: 10px;
            color: #94a3b8;
            padding: 8px 20px;
            cursor: pointer;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.25s;
        }
        .show-answer-btn:hover { border-color: #10b981; color: #34d399; background: var(--accent-glow); }

        /* Answer reveal panel */
        .answer-panel {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s, padding 0.3s;
            opacity: 0;
        }
        .answer-panel.open {
            max-height: 200px;
            opacity: 1;
        }

        /* Stats bar */
        .stat-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px 24px;
            text-align: center;
            min-width: 140px;
        }

        /* Progress bar */
        .progress-track {
            height: 4px;
            background: #1e293b;
            border-radius: 2px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #10b981, #06b6d4);
            border-radius: 2px;
            transition: width 0.4s ease;
        }

        /* Section divider */
        .section-divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 40px 0 24px;
        }
        .section-divider::before, .section-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, #334155, transparent);
        }
        .section-tag {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            font-weight: 600;
            color: #06b6d4;
            background: rgba(6, 182, 212, 0.1);
            border: 1px solid rgba(6, 182, 212, 0.2);
            padding: 6px 16px;
            border-radius: 20px;
            white-space: nowrap;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        /* Timer pulse when low */
        @keyframes timerPulse {
            0%, 100% { color: #f97316; }
            50% { color: #fb923c; text-shadow: 0 0 12px rgba(249, 115, 22, 0.5); }
        }
        .timer-warning { animation: timerPulse 1s ease-in-out infinite; }

        /* Fade in animation for cards */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in-up { animation: fadeInUp 0.5s ease forwards; }

        /* Question number badge */
        .q-num {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            font-weight: 700;
            color: #64748b;
            background: rgba(100, 116, 139, 0.1);
            border: 1px solid rgba(100, 116, 139, 0.15);
            padding: 3px 10px;
            border-radius: 6px;
            letter-spacing: 0.05em;
        }

        /* Floating nav dots */
        .nav-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #334155;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            padding: 0;
        }
        .nav-dot:hover { background: #475569; transform: scale(1.3); }
        .nav-dot.dot-correct { background: #10b981; }
        .nav-dot.dot-wrong { background: #dc2626; }
        .nav-dot.dot-current { background: #06b6d4; transform: scale(1.4); box-shadow: 0 0 8px rgba(6, 182, 212, 0.4); }

        /* Result modal */
        .result-grade {
            font-size: 4rem;
            font-weight: 800;
            line-height: 1;
            background: linear-gradient(135deg, #10b981, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        @media (max-width: 640px) {
            .stat-card { min-width: 100px; padding: 12px 14px; }
            .stat-card .text-2xl { font-size: 1.25rem; }
        }
    </style>
</head>

        // ========== STATE ==========
        let userAnswers = {}; // { questionId: selectedIndex }
        let revealedAnswers = {}; // { questionId: true }
        let timerSeconds = 60 * 60;
        let timerInterval = null;
        let testSubmitted = false;

        // ========== DOM REFS ==========
        const startModal = document.getElementById('startModal');
        const resultModal = document.getElementById('resultModal');
        const mainApp = document.getElementById('mainApp');
        const startBtn = document.getElementById('startBtn');
        const submitBtn = document.getElementById('submitBtn');
        const restartBtn = document.getElementById('restartBtn');
        const reviewBtn = document.getElementById('reviewBtn');
        const showAllAnswersBtn = document.getElementById('showAllAnswersBtn');
        const timerDisplay = document.getElementById('timerDisplay');
        const progressFill = document.getElementById('progressFill');
        const statCorrect = document.getElementById('statCorrect');
        const statWrong = document.getElementById('statWrong');
        const statSkipped = document.getElementById('statSkipped');
        const questionsContainer = document.getElementById('questionsContainer');
        const navDots = document.getElementById('navDots');

        // ========== BUILD UI ==========
        function buildQuestions() {
            let html = '';
            let lastSection = '';

            questions.forEach((q, idx) => {
                // Section divider
                if (q.section !== lastSection) {
                    lastSection = q.section;
                    html += `
                        <div class="section-divider">
                            <span class="section-tag">Section ${q.section}: ${q.sectionTitle}</span>
                        </div>
                    `;
                }

                const optLabels = ['A', 'B', 'C', 'D'];
                let optionsHtml = '';
                q.options.forEach((opt, oi) => {
                    optionsHtml += `
                        <button class="option-btn flex items-center" data-qid="${q.id}" data-oidx="${oi}" onclick="selectOption(${q.id}, ${oi})">
                            <span class="opt-label">${optLabels[oi]}</span>
                            <span>${opt}</span>
                        </button>
                    `;
                });

                html += `
                    <div class="q-card p-6 sm:p-8 mb-5 fade-in-up" id="qcard-${q.id}" style="animation-delay: ${Math.min(idx * 30, 600)}ms">
                        <div class="flex items-start justify-between gap-4 mb-5">
                            <p class="text-white font-medium text-base sm:text-lg leading-relaxed">${q.question}</p>
                            <span class="q-num">Q${q.id}</span>
                        </div>
                        <div class="grid gap-3 mb-5" id="options-${q.id}">
                            ${optionsHtml}
                        </div>
                        <div class="flex items-center justify-between">
                            <button class="show-answer-btn" id="showbtn-${q.id}" onclick="revealAnswer(${q.id})">
                                <i class="fa-solid fa-eye mr-2"></i>Show Answer
                            </button>
                            <span class="text-xs font-mono text-slate-600" id="status-${q.id}"></span>
                        </div>
                        <div class="answer-panel mt-4" id="answer-panel-${q.id}">
                            <div class="bg-mint-500/5 border border-mint-500/15 rounded-xl px-5 py-4 flex items-center gap-3">
                                <div class="w-8 h-8 rounded-lg bg-mint-500/15 flex items-center justify-center flex-shrink-0">
                                    <i class="fa-solid fa-check text-mint-400 text-sm"></i>
                                </div>
                                <div>
                                    <span class="text-mint-400 font-semibold text-sm">Correct Answer: </span>
                                    <span class="text-white text-sm font-medium" id="answertext-${q.id}"></span>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });

            questionsContainer.innerHTML = html;
        }

        function buildNavDots() {
            let html = '';
            questions.forEach(q => {
                html += `<button class="nav-dot" id="dot-${q.id}" title="Q${q.id}" onclick="scrollToQuestion(${q.id})"></button>`;
            });
            navDots.innerHTML = html;
        }

        // ========== INTERACTIONS ==========
        function selectOption(qid, oidx) {
            if (testSubmitted) return;
            if (revealedAnswers[qid]) return; // Already revealed, can't change

            userAnswers[qid] = oidx;

            // Update option styles
            const options = document.querySelectorAll(`[data-qid="${qid}"]`);
            options.forEach((btn, i) => {
                btn.classList.remove('selected');
                if (i === oidx) btn.classList.add('selected');
            });

            updateStats();
        }

        function revealAnswer(qid) {
            revealedAnswers[qid] = true;
            const q = questions.find(x => x.id === qid);
            const panel = document.getElementById(`answer-panel-${qid}`);
            const btn = document.getElementById(`showbtn-${qid}`);
            const statusEl = document.getElementById(`status-${qid}`);
            const card = document.getElementById(`qcard-${qid}`);
            const optLabels = ['A', 'B', 'C', 'D'];

            // Set answer text
            document.getElementById(`answertext-${qid}`).textContent = `${optLabels[q.answer]}. ${q.options[q.answer]}`;

            // Open panel
            panel.classList.add('open');

            // Disable button
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-eye-slash mr-2"></i>Revealed';
            btn.style.opacity = '0.4';
            btn.style.cursor = 'default';

            // Style options
            const options = document.querySelectorAll(`[data-qid="${qid}"]`);
            options.forEach((btn, i) => {
                btn.classList.add('disabled');
                btn.classList.remove('selected');
                if (i === q.answer) {
                    btn.classList.add('correct-reveal');
                } else if (i === userAnswers[qid] && userAnswers[qid] !== q.answer) {
                    btn.classList.add('wrong-reveal');
                }
            });

            // Card border feedback
            if (userAnswers[qid] !== undefined) {
                if (userAnswers[qid] === q.answer) {
                    card.classList.add('answered-correct');
                    statusEl.innerHTML = '<span class="text-mint-400"><i class="fa-solid fa-circle-check mr-1"></i>Correct</span>';
                } else {
                    card.classList.add('answered-wrong');
                    statusEl.innerHTML = '<span class="text-red-400"><i class="fa-solid fa-circle-xmark mr-1"></i>Wrong</span>';
                }
            } else {
                statusEl.innerHTML = '<span class="text-slate-500"><i class="fa-solid fa-circle-minus mr-1"></i>Skipped</span>';
            }

            // Update nav dot
            const dot = document.getElementById(`dot-${qid}`);
            if (dot) {
                dot.classList.remove('dot-current');
                if (userAnswers[qid] !== undefined && userAnswers[qid] === q.answer) {
                    dot.classList.add('dot-correct');
                } else if (userAnswers[qid] !== undefined) {
                    dot.classList.add('dot-wrong');
                }
            }

            updateStats();
        }

        function scrollToQuestion(qid) {
            const card = document.getElementById(`qcard-${qid}`);
            if (card) {
                card.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        // ========== STATS ==========
        function updateStats() {
            let correct = 0, wrong = 0, skipped = 0, answered = 0;

            questions.forEach(q => {
                if (revealedAnswers[q.id]) {
                    if (userAnswers[q.id] !== undefined) {
                        if (userAnswers[q.id] === q.answer) correct++;
                        else wrong++;
                    } else {
                        skipped++;
                    }
                    answered++;
                }
            });

            statCorrect.textContent = correct;
            statWrong.textContent = wrong;
            statSkipped.textContent = 40 - answered;
            progressFill.style.width = `${(answered / 40) * 100}%`;
        }

        // ========== TIMER ==========
        function startTimer() {
            timerSeconds = 60 * 60;
            updateTimerDisplay();
            timerInterval = setInterval(() => {
                timerSeconds--;
                if (timerSeconds <= 0) {
                    timerSeconds = 0;
                    clearInterval(timerInterval);
                    submitTest();
                }
                updateTimerDisplay();
            }, 1000);
        }

        function updateTimerDisplay() {
            const m = Math.floor(timerSeconds / 60);
            const s = timerSeconds % 60;
            timerDisplay.textContent = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;

            if (timerSeconds <= 300) {
                timerDisplay.classList.add('timer-warning');
            } else {
                timerDisplay.classList.remove('timer-warning');
            }
        }

        // ========== SUBMIT ==========
        function submitTest() {
            if (testSubmitted) return;
            testSubmitted = true;
            clearInterval(timerInterval);

            // Reveal all unrevealed answers first
            questions.forEach(q => {
                if (!revealedAnswers[q.id]) {
                    revealAnswer(q.id);
                }
            });

            // Calculate results
            let correct = 0, wrong = 0, skipped = 0;
            questions.forEach(q => {
                if (userAnswers[q.id] !== undefined) {
                    if (userAnswers[q.id] === q.answer) correct++;
                    else wrong++;
                } else {
                    skipped++;
                }
            });

            const percent = Math.round((correct / 40) * 100);
            let grade = 'F';
            if (percent >= 90) grade = 'A+';
            else if (percent >= 80) grade = 'A';
            else if (percent >= 70) grade = 'B+';
            else if (percent >= 60) grade = 'B';
            else if (percent >= 50) grade = 'C';
            else if (percent >= 40) grade = 'D';

            // Update grade color for fail
            const gradeEl = document.getElementById('resultGrade');
            if (percent < 40) {
                gradeEl.style.background = 'linear-gradient(135deg, #ef4444, #f97316)';
                gradeEl.style.webkitBackgroundClip = 'text';
                gradeEl.style.webkitTextFillColor = 'transparent';
                gradeEl.style.backgroundClip = 'text';
            } else {
                gradeEl.style.background = 'linear-gradient(135deg, #10b981, #06b6d4)';
                gradeEl.style.webkitBackgroundClip = 'text';
                gradeEl.style.webkitTextFillColor = 'transparent';
                gradeEl.style.backgroundClip = 'text';
            }
            gradeEl.textContent = grade;
            document.getElementById('resultPercent').textContent = `${percent}% — ${correct}/40 marks`;
            document.getElementById('resultCorrect').textContent = correct;
            document.getElementById('resultWrong').textContent = wrong;
            document.getElementById('resultSkipped').textContent = skipped;

            // Show result modal
            setTimeout(() => {
                resultModal.classList.remove('hidden');
            }, 400);
        }

        // ========== SHOW ALL ANSWERS ==========
        function revealAllAnswers() {
            questions.forEach(q => {
                if (!revealedAnswers[q.id]) {
                    revealAnswer(q.id);
                }
            });
            showAllAnswersBtn.innerHTML = '<i class="fa-solid fa-eye-slash mr-1"></i> All Revealed';
            showAllAnswersBtn.style.color = '#10b981';
        }

        // ========== SCROLL SPY for nav dots ==========
        function setupScrollSpy() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const qid = parseInt(entry.target.id.replace('qcard-', ''));
                        // Remove current from all
                        document.querySelectorAll('.nav-dot').forEach(d => d.classList.remove('dot-current'));
                        // Only add current if not already correct/wrong
                        const dot = document.getElementById(`dot-${qid}`);
                        if (dot && !dot.classList.contains('dot-correct') && !dot.classList.contains('dot-wrong')) {
                            dot.classList.add('dot-current');
                        }
                    }
                });
            }, { rootMargin: '-30% 0px -60% 0px' });

            questions.forEach(q => {
                const card = document.getElementById(`qcard-${q.id}`);
                if (card) observer.observe(card);
            });
        }

        // ========== RESET ==========
        function resetTest() {
            userAnswers = {};
            revealedAnswers = {};
            testSubmitted = false;
            clearInterval(timerInterval);

            resultModal.classList.add('hidden');
            showAllAnswersBtn.innerHTML = '<i class="fa-solid fa-eye mr-1"></i> Reveal All';
            showAllAnswersBtn.style.color = '';

            buildQuestions();
            buildNavDots();
            updateStats();
            setupScrollSpy();
            startTimer();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // ========== EVENT LISTENERS ==========
        startBtn.addEventListener('click', () => {
            startModal.classList.add('hidden');
            mainApp.classList.remove('hidden');
            buildQuestions();
            buildNavDots();
            updateStats();
            setupScrollSpy();
            startTimer();
        });

        submitBtn.addEventListener('click', submitTest);
        showAllAnswersBtn.addEventListener('click', revealAllAnswers);
        restartBtn.addEventListener('click', resetTest);
        reviewBtn.addEventListener('click', () => {
            resultModal.classList.add('hidden');
        });

        // Keyboard shortcut: Escape to close modals
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                if (!resultModal.classList.contains('hidden')) {
                    resultModal.classList.add('hidden');
                }
            }
        });
    </script>
