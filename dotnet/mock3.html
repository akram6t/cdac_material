<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CDAC CCE Mock 3 — .NET Technologies</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script>
        tailwind.config={theme:{extend:{fontFamily:{display:['Space Grotesk','sans-serif'],mono:['JetBrains Mono','monospace']}}}}
    </script>
    <style>
        :root{--bg:#0d1117;--card:#151b23;--border:#21262d;--accent:#10b981;--adim:rgba(16,185,129,.1);--red:#f85149;--blue:#58a6ff;--muted:#7d8590;--text:#e6edf3;--sub:#c9d1d9;--amber:#d29922}
        *{box-sizing:border-box;margin:0}
        body{background:var(--bg);font-family:'Space Grotesk',sans-serif;color:var(--text)}
        ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:#30363d;border-radius:3px}

        .mblur{background:rgba(0,0,0,.8);backdrop-filter:blur(10px)}
        .qcard{background:var(--card);border:1px solid var(--border);border-radius:12px;transition:border-color .2s}
        .qcard:hover{border-color:#30363d}
        .qcard.ok{border-color:#238636}
        .qcard.no{border-color:var(--red)}

        .obtn{background:rgba(21,27,35,.7);border:1px solid var(--border);border-radius:10px;padding:11px 14px;text-align:left;cursor:pointer;width:100%;color:var(--sub);font-family:'Space Grotesk',sans-serif;font-size:.88rem;line-height:1.55;display:flex;align-items:flex-start;gap:10px;transition:border-color .15s,background .15s}
        .obtn:hover:not(.lk){border-color:#484f58;background:rgba(21,27,35,1)}
        .obtn.pk{border-color:var(--accent);background:var(--adim);color:#3fb950}
        .obtn.lk{cursor:default;opacity:.7}
        .obtn.lk:hover{border-color:var(--border);background:rgba(21,27,35,.7)}
        .obtn.yes{border-color:#238636;background:rgba(35,134,54,.12);color:#3fb950;opacity:1!important}
        .obtn.nah{border-color:var(--red);background:rgba(248,81,73,.1);color:#f85149;opacity:1!important}

        .olbl{flex-shrink:0;width:26px;height:26px;border-radius:6px;background:rgba(125,133,144,.1);display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-weight:600;font-size:.75rem;color:var(--muted);transition:all .15s}
        .obtn.pk .olbl{background:rgba(16,185,129,.2);color:#3fb950}
        .obtn.yes .olbl{background:rgba(35,134,54,.25);color:#3fb950}
        .obtn.nah .olbl{background:rgba(248,81,73,.2);color:#f85149}

        .rbtn{background:transparent;border:1px solid #30363d;border-radius:8px;color:var(--muted);padding:7px 16px;cursor:pointer;font-family:'Space Grotesk',sans-serif;font-size:.8rem;font-weight:500;transition:border-color .15s,color .15s}
        .rbtn:hover{border-color:var(--accent);color:#3fb950}
        .rbtn.used{opacity:.3;cursor:default;pointer-events:none}

        .apanel{max-height:0;overflow:hidden;opacity:0;transition:max-height .3s,opacity .25s,margin .25s;margin-top:0}
        .apanel.open{max-height:320px;opacity:1;margin-top:16px}

        .slabel{font-family:'JetBrains Mono',monospace;font-size:.68rem;font-weight:600;color:var(--blue);background:rgba(88,166,255,.08);border:1px solid rgba(88,166,255,.15);padding:5px 14px;border-radius:16px;white-space:nowrap;letter-spacing:.04em;text-transform:uppercase}
        .sline{flex:1;height:1px;background:linear-gradient(90deg,transparent,#21262d,transparent)}

        .sbox{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 18px;text-align:center;min-width:105px}
        .ptrack{height:3px;background:#21262d;border-radius:2px;overflow:hidden}
        .pfill{height:100%;background:linear-gradient(90deg,#10b981,#58a6ff);border-radius:2px;transition:width .3s}

        .qnum{font-family:'JetBrains Mono',monospace;font-size:.63rem;font-weight:700;color:var(--muted);background:rgba(125,133,144,.08);border:1px solid rgba(125,133,144,.12);padding:2px 8px;border-radius:5px}

        .ndot{width:8px;height:8px;border-radius:50%;background:#30363d;cursor:pointer;border:none;padding:0;transition:background .15s,transform .15s}
        .ndot:hover{background:#484f58;transform:scale(1.3)}
        .ndot.dc{background:#238636}
        .ndot.dw{background:var(--red)}
        .ndot.dn{background:var(--blue);transform:scale(1.4);box-shadow:0 0 6px rgba(88,166,255,.4)}

        @keyframes tp{0%,100%{color:var(--red)}50%{color:#fb923c}}
        .tw{animation:tp 1s ease-in-out infinite}

        .gtxt{font-size:3.5rem;font-weight:800;line-height:1;background:linear-gradient(135deg,#10b981,#58a6ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        .gfail{background:linear-gradient(135deg,#f85149,#f97316);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

        .cblock{background:#0d1117;border:1px solid #21262d;border-radius:8px;padding:12px 16px;font-family:'JetBrains Mono',monospace;font-size:.76rem;line-height:1.65;color:var(--sub);overflow-x:auto;margin-bottom:14px;white-space:pre}

        .expl-box{background:rgba(88,166,255,.04);border:1px solid rgba(88,166,255,.1);border-radius:10px;padding:12px 16px;margin-top:10px}
        .expl-box p{font-size:.84rem;line-height:1.65;color:#8b949e}

        @media(max-width:640px){.sbox{min-width:78px;padding:10px 8px}}
    </style>
</head>
<body class="min-h-screen">

<!-- START MODAL -->
<div id="startM" class="mblur fixed inset-0 z-50 flex items-center justify-center p-4">
    <div class="border border-[#21262d] rounded-2xl p-8 sm:p-10 max-w-lg w-full" style="background:#151b23">
        <div class="flex items-center gap-3 mb-2">
            <div class="w-9 h-9 rounded-lg flex items-center justify-center" style="background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.18)">
                <i class="fa-brands fa-microsoft text-emerald-400 text-sm"></i>
            </div>
            <span class="font-mono text-xs tracking-widest uppercase" style="color:rgba(16,185,129,.55)">CDAC CCE</span>
        </div>

        <div class="grid grid-cols-3 gap-3 mb-7">
            <div class="rounded-xl p-4 text-center border border-[#21262d]" style="background:rgba(13,17,23,.5)"><div class="text-xl font-bold text-white">40</div><div class="text-xs mt-1" style="color:var(--muted)">Questions</div></div>
            <div class="rounded-xl p-4 text-center border border-[#21262d]" style="background:rgba(13,17,23,.5)"><div class="text-xl font-bold text-white">40</div><div class="text-xs mt-1" style="color:var(--muted)">Marks</div></div>
            <div class="rounded-xl p-4 text-center border border-[#21262d]" style="background:rgba(13,17,23,.5)"><div class="text-xl font-bold text-white">60</div><div class="text-xs mt-1" style="color:var(--muted)">Minutes</div></div>
        </div>
        <div class="space-y-2 mb-7 text-sm" style="color:var(--muted)">
            <div class="flex items-center gap-3"><i class="fa-solid fa-circle-check w-4 text-emerald-500/50"></i>Select an option then click Show Answer</div>
            <div class="flex items-center gap-3"><i class="fa-solid fa-circle-check w-4 text-emerald-500/50"></i>Explanation shown with each answer</div>

    </div>
</div>

<!-- RESULT MODAL -->
<div id="resM" class="mblur fixed inset-0 z-50 flex items-center justify-center p-4 hidden">
    <div class="border border-[#21262d] rounded-2xl p-8 sm:p-10 max-w-md w-full text-center" style="background:#151b23">
        <div id="rG" class="gtxt mb-1"></div>
        <div id="rP" class="text-sm font-mono mb-6" style="color:var(--muted)"></div>
        <div class="grid grid-cols-3 gap-3 mb-7">
            <div class="rounded-xl p-4 text-center border border-[#21262d]" style="background:rgba(13,17,23,.5)"><div id="rC" class="text-xl font-bold text-emerald-400">0</div><div class="text-xs mt-1" style="color:var(--muted)">Correct</div></div>
            <div class="rounded-xl p-4 text-center border border-[#21262d]" style="background:rgba(13,17,23,.5)"><div id="rW" class="text-xl font-bold text-red-400">0</div><div class="text-xs mt-1" style="color:var(--muted)">Wrong</div></div>
            <div class="rounded-xl p-4 text-center border border-[#21262d]" style="background:rgba(13,17,23,.5)"><div id="rS" class="text-xl font-bold" style="color:var(--muted)">0</div><div class="text-xs mt-1" style="color:var(--muted)">Skipped</div></div>
        </div>
        <div class="flex gap-3">
            <button id="revBtn" class="flex-1 py-3 border border-[#30363d] text-sm font-semibold rounded-xl transition-colors cursor-pointer" style="color:var(--sub);background:transparent" onmouseover="this.style.borderColor='#484f58'" onmouseout="this.style.borderColor='#30363d'"><i class="fa-solid fa-list-check mr-2"></i>Review</button>
            <button id="rstBtn" class="flex-1 py-3 text-white text-sm font-semibold rounded-xl transition-colors cursor-pointer" style="background:#238636" onmouseover="this.style.background='#2ea043'" onmouseout="this.style.background='#238636'"><i class="fa-solid fa-rotate-right mr-2"></i>Restart</button>
        </div>
    </div>
</div>

<!-- MAIN APP -->
<div id="app" class="hidden relative z-10">
    <header class="sticky top-0 z-40 border-b border-[#21262d]" style="backdrop-filter:blur(12px);background:rgba(13,17,23,.92)">
        <div class="max-w-4xl mx-auto px-4 py-3">
            <div class="flex items-center justify-between mb-2">
                <div class="flex items-center gap-3">
                    <div class="w-7 h-7 rounded-md flex items-center justify-center" style="background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.15)"><i class="fa-brands fa-microsoft text-emerald-400 text-xs"></i></div>

                    <span class="text-emerald-400"><i class="fa-solid fa-check mr-1"></i><span id="hC">0</span></span>
                    <span class="text-red-400"><i class="fa-solid fa-xmark mr-1"></i><span id="hW">0</span></span>
                    <span style="color:var(--muted)"><i class="fa-solid fa-minus mr-1"></i><span id="hS">40</span></span>
                </div>

        </div>

    <main class="max-w-4xl mx-auto px-4 pt-8 pb-28"><div id="qc"></div></main>

    <div class="fixed bottom-0 left-0 right-0 z-40 border-t border-[#21262d]" style="backdrop-filter:blur(12px);background:rgba(13,17,23,.93)">
        <div class="max-w-4xl mx-auto px-4 py-3 flex items-center justify-between">
            <button id="raBtn" class="text-xs font-mono transition-colors cursor-pointer" style="color:var(--muted)" onmouseover="this.style.color='#3fb950'" onmouseout="this.style.color='var(--muted)'"><i class="fa-solid fa-eye mr-1"></i> Reveal All</button>
            <button id="subBtn" class="py-3 px-8 text-white font-bold rounded-xl text-sm transition-colors cursor-pointer" style="background:#238636" onmouseover="this.style.background='#2ea043'" onmouseout="this.style.background='#238636'">Submit Test <i class="fa-solid fa-paper-plane ml-2"></i></button>
        </div>

    <nav id="dots" class="fixed right-3 top-1/2 -translate-y-1/2 z-30 flex-col gap-1.5 max-h-[70vh] overflow-y-auto py-2 pr-1 hidden sm:flex" style="scrollbar-width:none"></nav>
</div>

<script>
const D=[
// Section A: C# & .NET Fundamentals
{id:1,s:'A',st:'C# & .NET Fundamentals',
q:'Which of the following is a value type?',
o:['String','Object','Enum','Interface'],a:2,
e:'Enum is a value type derived from integral types and stored on the stack. String, Object, and Interface are all reference types.'},
{id:2,s:'A',st:'C# & .NET Fundamentals',
q:'What is the correct way to call a base class constructor from derived class?',
o:['base()',': base() in constructor declaration','this()','super()'],a:1,
e:'The syntax : base() is used in the derived class constructor declaration to explicitly call a specific base class constructor.'},
{id:3,s:'A',st:'C# & .NET Fundamentals',
q:'What will be the output?',
c:`using System;\nclass Program {\n    static void Main() {\n        int? nullable = null;\n        Console.WriteLine(nullable ?? 100);\n        Console.WriteLine(nullable.HasValue);\n    }\n}`,
o:['100 True','100 False','null False','Compile error'],a:1,
e:'The null-coalescing operator ?? returns 100 since nullable is null. HasValue returns false for null nullable values.'},
{id:4,s:'A',st:'C# & .NET Fundamentals',
q:'Which keyword prevents method overriding while allowing inheritance?',
o:['sealed on method','abstract','virtual','new'],a:0,
e:'Applying sealed to a virtual method in a derived class prevents further subclasses from overriding it, while the class itself can still be inherited.'},
{id:5,s:'A',st:'C# & .NET Fundamentals',
q:'What happens when you assign one struct variable to another?',
o:['Reference is copied','Member-wise value copy for simple types','Shallow copy','Boxing occurs'],a:1,
e:'Structs are value types. Assignment copies each member by value. For simple value type members this is effectively a deep copy.'},
{id:6,s:'A',st:'C# & .NET Fundamentals',
q:'Properties in C# are essentially:',
o:['Special fields','Methods with get/set accessors','Delegates','Events'],a:1,
e:'Properties are syntactic sugar over get and set methods. The compiler generates corresponding getter and setter methods behind the scenes.'},
{id:7,s:'A',st:'C# & .NET Fundamentals',
q:'What will be the output of this code?',
c:`using System;\nclass Program {\n    static void Main() {\n        Console.WriteLine(10 / 3);\n        Console.WriteLine(10 / 3.0);\n    }\n}`,
o:['3 3','3 3.333...','3.333 3.333','Compile error'],a:1,
e:'10/3 is integer division yielding 3. 10/3.0 involves a double operand, so the result is 3.333... with floating-point division.'},
{id:8,s:'A',st:'C# & .NET Fundamentals',
q:'Which of the following is true about constant fields?',
o:['Can be changed at runtime','Must be initialized at declaration','Can be set in constructor','Are reference types'],a:1,
e:'Constants must be initialized at declaration. They are evaluated at compile time and cannot be modified at runtime or in constructors.'},
{id:9,s:'A',st:'C# & .NET Fundamentals',
q:'What is an indexer?',
o:['Way to access class members like an array','Property for static data','Generic constraint','Event handler'],a:0,
e:'An indexer allows instances of a class to be indexed like arrays using the this[] syntax, enabling custom access patterns.'},
{id:10,s:'A',st:'C# & .NET Fundamentals',
q:'In C#, all classes derive from:',
o:['System.ValueType','System.Object','System.Exception','No default base'],a:1,
e:'Every class in C# implicitly inherits from System.Object, which provides methods like ToString(), Equals(), and GetHashCode().' },
{id:11,s:'A',st:'C# & .NET Fundamentals',
q:'What does the out parameter keyword do?',
o:['Passes value by reference and must be initialized before call','Passes by reference and must be assigned inside method','Read-only parameter','Optional parameter'],a:1,
e:'The out keyword passes by reference like ref, but the variable does not need initialization before the call. The method must assign it before returning.'},
{id:12,s:'A',st:'C# & .NET Fundamentals',
q:'Which collection allows duplicate elements and maintains insertion order?',
o:['HashSet<T>','List<T>','Dictionary<TKey,TValue>','SortedSet<T>'],a:1,
e:'List<T> allows duplicates and preserves insertion order. HashSet and SortedSet do not allow duplicates. Dictionary stores key-value pairs.'},
{id:13,s:'A',st:'C# & .NET Fundamentals',
q:'What is the default access modifier for a class?',
o:['public','internal','private','protected'],a:1,
e:'Top-level class members default to private, but a top-level class itself defaults to internal, making it accessible within the same assembly.'},
{id:14,s:'A',st:'C# & .NET Fundamentals',
q:'What will happen if a static constructor throws an exception?',
o:['Application continues','Type becomes unusable and exception on first use','Caught automatically','Only affects that instance'],a:1,
e:'If a static constructor throws, the type becomes unusable for the lifetime of the AppDomain. A TypeInitializationException wraps the original error.'},
{id:15,s:'A',st:'C# & .NET Fundamentals',
q:'Which of the following supports multiple inheritance in C#?',
o:['Classes','Interfaces','Structs','Delegates'],a:1,
e:'C# supports multiple inheritance only through interfaces. A class can implement multiple interfaces but can inherit from only one base class.'},

// Section B: C# Advanced Concepts
{id:16,s:'B',st:'C# Advanced Concepts',
q:'What is the output of this delegate example?',
c:`using System;\ndelegate void MyDel(string msg);\nclass Program {\n    static void Main() {\n        MyDel del = Console.WriteLine;\n        del("Hello");\n    }\n}`,
o:['Compile error','Hello','Nothing','Exception'],a:1,
e:'A delegate can reference any method with a matching signature. Console.WriteLine has the same signature as MyDel, so it prints "Hello".'},
{id:17,s:'B',st:'C# Advanced Concepts',
q:'LINQ query execution is:',
o:['Immediate by default','Deferred until enumeration','Always parallel','Cached automatically'],a:1,
e:'LINQ queries use deferred execution by default. The query is not executed until the result is enumerated, such as with a foreach loop.'},
{id:18,s:'B',st:'C# Advanced Concepts',
q:'What is the purpose of Assembly.Load in Reflection?',
o:['To load types at runtime dynamically','To compile code','To create new assembly','For garbage collection'],a:0,
e:'Assembly.Load dynamically loads an assembly at runtime, enabling reflection over its types, methods, and properties without compile-time reference.'},
{id:19,s:'B',st:'C# Advanced Concepts',
q:'Which of the following is used for file I/O in a memory-efficient way?',
o:['File.ReadAllText','FileStream with buffered reading','StreamReader without buffer','BinaryFormatter'],a:1,
e:'FileStream with buffered reading processes data in chunks rather than loading the entire file into memory, making it efficient for large files.'},
{id:20,s:'B',st:'C# Advanced Concepts',
q:'What does the lock statement use internally?',
o:['Monitor.Enter and Exit','Mutex','Semaphore','Task'],a:0,
e:'The lock statement is syntactic sugar over Monitor.Enter and Monitor.Exit, providing mutual exclusion within a single process.'},
{id:21,s:'B',st:'C# Advanced Concepts',
q:'What will be the result of this lambda?',
c:`using System;\nusing System.Collections.Generic;\nclass Program {\n    static void Main() {\n        List<int> list = new List<int> {1,2,3,4};\n        var even = list.FindAll(x => x % 2 == 0);\n        Console.WriteLine(even.Count);\n    }\n}`,
o:['1','2','4','Compile error'],a:1,
e:'FindAll filters the list where x % 2 == 0, yielding elements 2 and 4. Count returns 2.'},
{id:22,s:'B',st:'C# Advanced Concepts',
q:'Which attribute controls serialization behavior?',
o:['[Serializable]','[NonSerialized]','Both','[DataContract] only'],a:2,
e:'[Serializable] marks a type for serialization, [NonSerialized] excludes specific fields. Both work together to control what gets serialized.'},
{id:23,s:'B',st:'C# Advanced Concepts',
q:'What is Task Parallel Library primarily for?',
o:['Data parallelism and task scheduling','Only I/O operations','Single-threaded execution','Database transactions'],a:0,
e:'TPL provides abstractions for data parallelism (Parallel.For/ForEach) and task-based asynchronous patterns, efficiently utilizing multiple CPU cores.'},
{id:24,s:'B',st:'C# Advanced Concepts',
q:'What happens when you use yield return in a method?',
o:['Creates an iterator','Returns immediately like return','Makes method async','Throws exception'],a:0,
e:'yield return transforms the method into a state machine iterator. Each call to MoveNext() resumes execution from where it last yielded.'},
{id:25,s:'B',st:'C# Advanced Concepts',
q:'Which is true about exception handling with when clause?',
o:['C# 6+ feature for filtering exceptions','Available since C# 1.0','Replaces try-catch','Only for custom exceptions'],a:0,
e:'The when clause was introduced in C# 6 as an exception filter. It allows catch blocks to conditionally handle exceptions based on runtime conditions.'},

// Section C: ASP.NET Core MVC & Web API
{id:26,s:'C',st:'ASP.NET Core MVC & Web API',
q:'The order of middleware execution in ASP.NET Core is:',
o:['Registration order from top to bottom','Reverse of registration','Alphabetical','Random'],a:0,
e:'Middleware components execute in the order they are registered with app.UseXXX() calls. The request flows through each in sequence.'},
{id:27,s:'C',st:'ASP.NET Core MVC & Web API',
q:'Which Tag Helper is used for anchor links?',
o:['<a asp-controller="">','<link>','<form asp-action="">','Both anchor and form Tag Helpers are used in MVC'],a:3,
e:'Both <a asp-controller="..." asp-action="..."> and <form asp-action="..."> are ASP.NET Core Tag Helpers that generate proper URLs and HTML.'},
{id:28,s:'C',st:'ASP.NET Core MVC & Web API',
q:'In Web API, what does [ProducesResponseType] attribute do?',
o:['Documents possible HTTP status codes for Swagger/OpenAPI','Filters requests','Binds models','Enables CORS'],a:0,
e:'[ProducesResponseType] documents the possible response types and status codes an action can return, used by Swagger/OpenAPI to generate accurate API documentation.'},
{id:29,s:'C',st:'ASP.NET Core MVC & Web API',
q:'How is dependency injection configured in ASP.NET Core?',
o:['In Program.cs for minimal API or Startup.cs for older pattern','Only web.config','Global.asax','appsettings.json'],a:0,
e:'DI is configured in Program.cs using builder.Services.AddXXX() in the minimal hosting model, or in Startup.ConfigureServices() in the older pattern.'},
{id:30,s:'C',st:'ASP.NET Core MVC & Web API',
q:'What is the purpose of AntiForgeryToken in MVC?',
o:['Prevent Cross-Site Request Forgery attacks','Prevent SQL injection','Validate input length','Cache responses'],a:0,
e:'AntiForgeryToken generates a cryptographic token embedded in forms to prevent CSRF attacks by validating that the request originated from the same application.'},
{id:31,s:'C',st:'ASP.NET Core MVC & Web API',
q:'Which method is used to return JSON from controller action?',
o:['JsonResult','Content','View','Redirect'],a:0,
e:'JsonResult serializes an object to JSON and sets the Content-Type to application/json. It is returned by the Json() helper method in controllers.'},
{id:32,s:'C',st:'ASP.NET Core MVC & Web API',
q:'In Razor Views, @model directive is used for:',
o:['Strongly typed model declaration','Importing namespaces','Layout definition','Section rendering'],a:0,
e:'@model specifies the strongly-typed model for the view, enabling IntelliSense and compile-time checking when accessing Model properties.'},
{id:33,s:'C',st:'ASP.NET Core MVC & Web API',

// State
let ua={},rv={},sec=3600,ti=null,fin=false;
const L=['A','B','C','D'];
const $=id=>document.getElementById(id);
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function build(){
    let h='',ls='';
    D.forEach(q=>{
        if(q.s!==ls){ls=q.s;h+=`<div class="flex items-center gap-4 mt-10 mb-5"><div class="sline"></div><span class="slabel">Section ${q.s}: ${q.st}</span><div class="sline"></div></div>`}
        let ch=q.c?`<div class="cblock">${esc(q.c)}</div>`:'';
        let oh=q.o.map((o,i)=>`<button class="obtn" data-q="${q.id}" data-o="${i}" onclick="pick(${q.id},${i})"><span class="olbl">${L[i]}</span><span>${esc(o)}</span></button>`).join('');
        h+=`<div class="qcard p-5 sm:p-7 mb-4" id="qc-${q.id}">
            <div class="flex items-start justify-between gap-3 mb-4">
                <p class="text-white font-medium text-sm sm:text-base leading-relaxed">${esc(q.q)}</p>
                <span class="qnum">Q${q.id}</span>
            </div>
            ${ch}
            <div class="grid gap-2.5 mb-4" id="op-${q.id}">${oh}</div>
            <div class="flex items-center justify-between">
                <button class="rbtn" id="rb-${q.id}" onclick="reveal(${q.id})"><i class="fa-solid fa-eye mr-1.5"></i>Show Answer</button>
                <span class="text-xs font-mono" style="color:var(--muted)" id="st-${q.id}"></span>
            </div>
            <div class="apanel" id="ap-${q.id}">
                <div class="rounded-xl px-4 py-3 flex items-center gap-3" style="background:rgba(16,185,129,.06);border:1px solid rgba(16,185,129,.12)">
                    <div class="w-7 h-7 rounded-md flex items-center justify-center flex-shrink-0" style="background:rgba(16,185,129,.15)"><i class="fa-solid fa-check text-emerald-400 text-xs"></i></div>
                    <div><span class="text-emerald-400 font-semibold text-sm">Correct Answer: </span><span class="text-white text-sm font-medium" id="at-${q.id}"></span></div>
                </div>
                <div class="expl-box"><p><i class="fa-solid fa-lightbulb text-amber-400/70 mr-2"></i>${esc(q.e)}</p></div>
            </div>
        </div>`;
    });
    $('qc').innerHTML=h;
    $('dots').innerHTML=D.map(q=>`<button class="ndot" id="d-${q.id}" title="Q${q.id}" onclick="sc(${q.id})"></button>`).join('');
}

function pick(qi,oi){
    if(fin||rv[qi])return;
    ua[qi]=oi;
    document.querySelectorAll(`[data-q="${qi}"]`).forEach((b,i)=>{b.classList.toggle('pk',i===oi)});
    stats();
}

function reveal(qi){
    if(rv[qi])return;
    rv[qi]=true;
    const q=D.find(x=>x.id===qi);
    const card=$(`qc-${qi}`),btn=$(`rb-${qi}`),st=$(`st-${qi}`),ap=$(`ap-${qi}`);
    $(`at-${qi}`).textContent=`${L[q.a]}. ${q.o[q.a]}`;
    ap.classList.add('open');
    btn.classList.add('used');
    btn.innerHTML='<i class="fa-solid fa-eye-slash mr-1.5"></i>Revealed';
    document.querySelectorAll(`[data-q="${qi}"]`).forEach((b,i)=>{
        b.classList.remove('pk');b.classList.add('lk');
        if(i===q.a)b.classList.add('yes');
        else if(i===ua[qi]&&ua[qi]!==q.a)b.classList.add('nah');
    });
    if(ua[qi]!==undefined){
        if(ua[qi]===q.a){card.classList.add('ok');st.innerHTML='<span class="text-emerald-400"><i class="fa-solid fa-circle-check mr-1"></i>Correct</span>'}
        else{card.classList.add('no');st.innerHTML='<span class="text-red-400"><i class="fa-solid fa-circle-xmark mr-1"></i>Wrong</span>'}
    }else{st.innerHTML='<span style="color:var(--muted)"><i class="fa-solid fa-circle-minus mr-1"></i>Skipped</span>'}
    const dot=$(`d-${qi}`);
    if(dot){dot.classList.remove('dn');if(ua[qi]!==undefined&&ua[qi]===q.a)dot.classList.add('dc');else if(ua[qi]!==undefined)dot.classList.add('dw')}
    stats();
}

function sc(qi){const el=$(`qc-${qi}`);if(el)el.scrollIntoView({behavior:'smooth',block:'center'})}

function stats(){
    let c=0,w=0,n=0;
    D.forEach(q=>{if(rv[q.id]){n++;if(ua[q.id]!==undefined){if(ua[q.id]===q.a)c++;else w++}}});
    $('hC').textContent=c;$('hW').textContent=w;$('hS').textContent=40-n;
    $('pf').style.width=`${(n/40)*100}%`;
}

function startT(){
    sec=3600;upT();
    ti=setInterval(()=>{sec--;if(sec<=0){sec=0;clearInterval(ti);submit()}upT()},1000);
}
function upT(){
    const m=Math.floor(sec/60),s=sec%60;
    $('tmr').textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    if(sec<=300)$('tmr').classList.add('tw');else $('tmr').classList.remove('tw');
}

function submit(){
    if(fin)return;fin=true;clearInterval(ti);
    D.forEach(q=>{if(!rv[q.id])reveal(q.id)});
    let c=0,w=0,sk=0;
    D.forEach(q=>{if(ua[q.id]!==undefined){if(ua[q.id]===q.a)c++;else w++}else sk++});
    const pct=Math.round((c/40)*100);
    let g='F';if(pct>=90)g='A+';else if(pct>=80)g='A';else if(pct>=70)g='B+';else if(pct>=60)g='B';else if(pct>=50)g='C';else if(pct>=40)g='D';
    const ge=$('rG');ge.textContent=g;ge.className=pct<40?'gtxt gfail mb-1':'gtxt mb-1';
    $('rP').textContent=`${pct}% — ${c}/40 marks`;
    $('rC').textContent=c;$('rW').textContent=w;$('rS').textContent=sk;
    setTimeout(()=>$('resM').classList.remove('hidden'),300);
}

function revealAll(){
    D.forEach(q=>{if(!rv[q.id])reveal(q.id)});
    const b=$('raBtn');b.innerHTML='<i class="fa-solid fa-eye-slash mr-1"></i> All Revealed';b.style.color='#3fb950';
}

function reset(){
    ua={};rv={};fin=false;clearInterval(ti);
    $('resM').classList.add('hidden');
    const b=$('raBtn');b.innerHTML='<i class="fa-solid fa-eye mr-1"></i> Reveal All';b.style.color='var(--muted)';
    build();stats();spy();startT();window.scrollTo({top:0,behavior:'smooth'});
}

function spy(){
    const obs=new IntersectionObserver(es=>{
        es.forEach(e=>{if(e.isIntersecting){
            const qi=parseInt(e.target.id.replace('qc-',''));
            document.querySelectorAll('.ndot').forEach(d=>d.classList.remove('dn'));
            const dot=$(`d-${qi}`);if(dot&&!dot.classList.contains('dc')&&!dot.classList.contains('dw'))dot.classList.add('dn');
        }});
    },{rootMargin:'-30% 0px -60% 0px'});
    D.forEach(q=>{const el=$(`qc-${q.id}`);if(el)obs.observe(el)});
}

 $('goBtn').addEventListener('click',()=>{$('startM').classList.add('hidden');$('app').classList.remove('hidden');build();stats();spy();startT()});
 $('subBtn').addEventListener('click',submit);
 $('raBtn').addEventListener('click',revealAll);
 $('rstBtn').addEventListener('click',reset);
 $('revBtn').addEventListener('click',()=>$('resM').classList.add('hidden'));
document.addEventListener('keydown',e=>{if(e.key==='Escape'&&!$('resM').classList.contains('hidden'))$('resM').classList.add('hidden')});
</script>
</body>
</html>
