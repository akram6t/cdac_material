        .sline{flex:1;height:1px;background:linear-gradient(90deg,transparent,#21262d,transparent)}

        .pfill{height:100%;background:linear-gradient(90deg,#10b981,#58a6ff);border-radius:2px;transition:width .3s}
        .qnum{font-family:'JetBrains Mono',monospace;font-size:.63rem;font-weight:700;color:var(--muted);background:rgba(125,133,144,.08);border:1px solid rgba(125,133,144,.12);padding:2px 8px;border-radius:5px}
        .ndot{width:8px;height:8px;border-radius:50%;background:#30363d;cursor:pointer;border:none;padding:0;transition:background .15s,transform .15s}

        @keyframes tp{0%,100%{color:var(--red)}50%{color:#fb923c}}

        .gfail{background:linear-gradient(135deg,#f85149,#f97316);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

        .expl-box{background:rgba(88,166,255,.04);border:1px solid rgba(88,166,255,.1);border-radius:10px;padding:12px 16px;margin-top:10px}

<script>
const D=[
{id:1,s:'A',st:'C# & .NET Fundamentals',q:'Which supports multiple inheritance?',o:['Interface allows a class to implement multiple interfaces achieving multiple inheritance of behavior contracts','Class supports only single inheritance from one base class','Struct does not support inheritance from any type','Enum cannot inherit from any other type'],a:0,e:'C# does not support multiple inheritance of implementation through classes. However, a class can implement any number of interfaces, achieving multiple inheritance of type contracts.'},
{id:2,s:'A',st:'C# & .NET Fundamentals',q:'Output of this code:',c:`class Base {\n    public virtual void Show() {\n        Console.WriteLine("Base");\n    }\n}\nclass Derived : Base {\n    public override void Show() {\n        Console.WriteLine("Derived");\n    }\n}\nBase b = new Derived();\nb.Show();`,o:['Base is printed because the reference type determines the method called','Derived is printed because virtual dispatch uses the actual object type at runtime','Compile error due to invalid override syntax','Runtime error because of type mismatch between Base reference and Derived object'],a:1,e:'With virtual/override, the method called is determined by the actual object type (Derived), not the reference type (Base). This is runtime polymorphism via virtual method dispatch.'},
{id:3,s:'A',st:'C# & .NET Fundamentals',q:'What is dependency injection?',o:['Dependency injection is a pattern where dependencies are passed into a class from outside rather than created internally','Dependency injection means creating dependency objects inside the class constructor','Dependency injection uses a static singleton instance for all dependencies','Dependency injection stores dependencies as global variables accessible everywhere'],a:0,e:'DI promotes loose coupling by injecting dependencies through constructor parameters, properties, or method parameters. The class does not create its own dependencies, making it easier to test and maintain.'},
{id:4,s:'A',st:'C# & .NET Fundamentals',q:'Correct async method signature:',o:['async Task Method() is the correct signature returning a Task that callers can await','async void Method() should only be used for event handlers not general async methods','Task async Method() has incorrect keyword placement','async Method() is missing a return type for async methods'],a:0,e:'async Task is the standard return type for async methods. async void should be avoided except for event handlers because exceptions in async void methods cannot be caught by the caller and crash the application.'},
{id:5,s:'A',st:'C# & .NET Fundamentals',q:'What does sealed override prevent?',o:['sealed override prevents further overriding of the virtual method in any subsequent derived class','sealed override prevents the class itself from being inherited by other classes','sealed override prevents method hiding with the new keyword in derived classes','sealed override disables runtime polymorphism entirely for that method chain'],a:0,e:'Applying sealed to an override method stops the virtual chain. No further derived class can override this method again, though the class itself can still be inherited.'},
{id:6,s:'A',st:'C# & .NET Fundamentals',q:'Output of following:',c:`var numbers = new[] {1,2,3,4};\nvar result = numbers\n    .Where(x => x % 2 == 0)\n    .Select(x => x * x);\nConsole.WriteLine(result.Count());`,o:['4 elements in the original array pass through the filters','2 because only 2 and 4 are even giving squared values 4 and 16 with Count returning 2','1 because only one element satisfies both conditions','0 because no elements pass the filter predicate'],a:1,e:'Where filters even numbers: 2 and 4. Select squares them: 4 and 16. Count() returns 2. LINQ uses deferred execution so both operations chain before Count triggers evaluation.'},
{id:7,s:'A',st:'C# & .NET Fundamentals',q:'Purpose of IComparable:',o:['IComparable defines CompareTo for custom sorting order when a class needs to be sorted in collections','IComparable checks equality between two objects like IEquatable does','IComparable generates hash codes for use in hash-based collections','IComparable defines the Dispose method for resource cleanup'],a:0,e:'IComparable<T>.CompareTo() defines a natural sorting order. Collections like Array.Sort() and List<T>.Sort() use this interface to determine element ordering.'},
{id:8,s:'A',st:'C# & .NET Fundamentals',q:'What is generic constraint where T : class?',o:['where T : class constrains the type parameter to reference types only excluding value types','where T : class constrains the type parameter to value types only','where T : class requires the type to have a public parameterless constructor','where T : class requires the type to implement a specific interface'],a:0,e:'The class constraint ensures T is a reference type (class, interface, delegate, array, or string). This prevents boxing and enables null comparisons. Use struct for value type constraints.'},
{id:9,s:'A',st:'C# & .NET Fundamentals',q:'Which is correct for properties?',o:['Auto-implemented properties and full get/set accessor properties are both valid ways to define properties in C#','Only auto-implemented properties with no backing logic are valid in modern C#','Only full get/set properties with explicit backing fields are considered correct','Direct field access without any accessor methods is the only correct approach'],a:0,e:'C# supports both: auto-properties (public int Age { get; set; }) for simple cases and full properties with private backing field and custom logic in get/set for complex scenarios.'},
{id:10,s:'A',st:'C# & .NET Fundamentals',q:'Output of code:',c:`static void Main() {\n    int x = 10;\n    Foo(ref x);\n    Console.WriteLine(x);\n}\nstatic void Foo(ref int a) { a = 50; }`,o:['10 because value types are always passed by value regardless of the ref keyword','50 because ref passes the variable by reference so changes inside Foo modify the original','0 because ref reinitializes the variable to its default value','Error because ref requires the variable to not be initialized before the call'],a:1,e:'The ref keyword passes x by reference. Inside Foo, a refers to the same memory location as x, so assigning a = 50 changes x to 50. The output is 50.'},
{id:11,s:'A',st:'C# & .NET Fundamentals',q:'What is attribute?',o:['Attribute is a declarative tag that adds metadata to code elements like classes, methods, and properties at compile time','Attribute is a type of code comment that is ignored by the compiler during compilation','Attribute is a special method that runs automatically before the main method entry point','Attribute is a class that cannot be instantiated and serves no runtime purpose'],a:0,e:'Attributes like [Serializable], [Obsolete], and [HttpGet] add metadata readable at runtime via Reflection. Custom attributes inherit from System.Attribute.'},
{id:12,s:'A',st:'C# & .NET Fundamentals',q:'Which collection maintains order and allows duplicates?',o:['List maintains insertion order and allows duplicate elements without any restrictions','HashSet eliminates duplicate elements and does not guarantee insertion order is preserved','Dictionary stores key-value pairs where keys must be unique and values can duplicate','SortedList maintains sorted order by key with unique keys and no duplicate entries'],a:0,e:'List<T> preserves the order in which elements were added and allows any number of duplicate values. It provides O(1) indexed access and O(n) search operations.'},
{id:13,s:'A',st:'C# & .NET Fundamentals',q:'Purpose of finally block:',o:['The finally block always executes whether an exception occurs or not ensuring cleanup code runs guaranteed','The finally block executes only when an exception is thrown and caught','The finally block executes only when the try block succeeds without any exceptions','The finally block is optional and rarely needed in modern C# with using statements'],a:0,e:'finally guarantees execution regardless of try/catch outcome. It is used for cleanup like closing connections, disposing resources, or releasing locks even when exceptions occur.'},
{id:14,s:'A',st:'C# & .NET Fundamentals',q:'What does String.IsNullOrWhiteSpace check?',o:['It checks if the string is null, empty, or contains only whitespace characters like spaces and tabs','It checks only if the string reference is null and nothing else','It checks only if the string has zero length ignoring any whitespace content','It checks only if the string length equals zero regardless of the actual content'],a:0,e:'IsNullOrWhiteSpace returns true for null, "", and strings containing only spaces, tabs, or newlines. It is more thorough than IsNullOrEmpty which does not catch whitespace-only strings.'},
{id:15,s:'A',st:'C# & .NET Fundamentals',q:'Which is not part of CLR?',o:['JIT compiler is a core CLR component that compiles IL to native machine code at runtime','Garbage Collector is a core CLR component for automatic memory management','Class Loader is a core CLR component that loads types and assemblies into memory','HTML Renderer is not part of the CLR as it belongs to browser engines not the .NET runtime'],a:3,e:'The CLR contains JIT compiler, Garbage Collector, Class Loader, Security Engine, and Exception Manager. HTML rendering is handled by browsers, not the .NET runtime.'},

// Section B
{id:16,s:'B',st:'C# Advanced & Multithreading',q:'What is deadlock?',o:['Deadlock occurs when two or more threads wait for each other to release locks creating a circular dependency where none can proceed','Deadlock is a race condition where multiple threads access shared data simultaneously causing corruption','Deadlock is thread starvation where a lower-priority thread never gets CPU time','Deadlock is a context switch between threads running on the same CPU core'],a:0,e:'Classic deadlock: Thread A holds Lock1 and waits for Lock2, while Thread B holds Lock2 and waits for Lock1. Neither can proceed, causing both threads to block indefinitely.'},
{id:17,s:'B',st:'C# Advanced & Multithreading',q:'Purpose of ConfigureAwait(false):',o:'ConfigureAwait(false) avoids capturing the synchronization context improving performance and preventing deadlocks in library code',o2:'ConfigureAwait(false) forces execution to resume on the UI thread for safe UI updates',o3:'ConfigureAwait(false) blocks the calling thread until the awaited task completes execution',o4:'ConfigureAwait(false) cancels the awaited task if it takes too long to complete',a:0,e:'ConfigureAwait(false) tells the awaiter not to capture the current SynchronizationContext. This avoids unnecessary marshaling back to the original context, improving performance and preventing deadlocks.'},
{id:18,s:'B',st:'C# Advanced & Multithreading',q:'Output of this snippet:',c:`Task.Run(() => Console.WriteLine("Task"));\nConsole.WriteLine("Main");`,o:['Main always prints first before Task starts executing on the thread pool','Task always prints first because it runs immediately on a separate thread','Main typically prints first but the order is not guaranteed because Task.Run schedules work asynchronously on a thread pool thread','This code will not compile due to invalid Task.Run usage'],a:2,e:'Task.Run queues work to the thread pool. "Main" executes immediately on the calling thread. The task runs asynchronously with no guaranteed ordering relative to the calling code.'},
{id:19,s:'B',st:'C# Advanced & Multithreading',q:'What is ValueTask?',o:['ValueTask is a struct-based alternative to Task that reduces heap allocations for async operations that often complete synchronously','ValueTask is a class-based type identical to Task with no meaningful differences','ValueTask can only be used with async methods and cannot be used in any other context','ValueTask is a synchronous-only construct that cannot be awaited by the caller'],a:0,e:'ValueTask<T> avoids allocating a Task object on the heap when the result is often available synchronously. It wraps either a T value or a Task<T>, reducing GC pressure in hot paths.'},
{id:20,s:'B',st:'C# Advanced & Multithreading',q:'Which is true for PLINQ?',o:['PLINQ executes LINQ queries in parallel across multiple CPU cores using AsParallel() for CPU-bound operations','PLINQ executes queries sequentially just like standard LINQ with no parallelism','PLINQ is designed only for asynchronous I/O-bound operations and not for CPU work','PLINQ removes all ordering guarantees from query results making output unpredictable'],a:0,e:'PLINQ partitions data and processes it across multiple cores. Use .AsParallel() to convert a LINQ query to PLINQ. Best suited for CPU-bound operations on large collections.'},
{id:21,s:'B',st:'C# Advanced & Multithreading',q:'What does Reflection allow?',o:['Reflection allows inspecting type metadata, reading attributes, and invoking methods dynamically at runtime','Reflection performs compile-time type checking and static analysis of code','Reflection is a static code analysis tool that runs before compilation to find issues','Reflection is used only for security permission checks at runtime and nothing else'],a:0,e:'System.Reflection provides APIs like Type.GetMethods(), PropertyInfo.GetValue(), and Activator.CreateInstance() to examine and manipulate types without compile-time knowledge.'},
{id:22,s:'B',st:'C# Advanced & Multithreading',q:'Purpose of Mutex:',o:['Mutex provides synchronization across multiple processes unlike Monitor which works only within a single process','Mutex provides thread synchronization within a single process only similar to lock','Mutex is used for asynchronous locking of async and await operations','Mutex provides read-only locking for concurrent read access to shared resources'],a:0,e:'Mutex is a named synchronization primitive that can span process boundaries. Commonly used for inter-process scenarios like ensuring only one application instance runs.'},
{id:23,s:'B',st:'C# Advanced & Multithreading',q:'What is Span<T>?',o:['Span<T> provides a memory-efficient way to slice into contiguous memory regions without any heap allocation','Span<T> is a direct replacement for arrays in all programming scenarios','Span<T> is a wrapper around List<T> providing dynamic resizing capability','Span<T> is a string-only type designed exclusively for substring operations'],a:0,e:'Span<T> is a ref struct providing a type-safe view over contiguous memory. It can wrap arrays, strings, or unmanaged memory without heap allocation, making it ideal for parsing and buffering.'},
{id:24,s:'B',st:'C# Advanced & Multithreading',q:'Output of code:',c:`try {\n    throw new Exception("Test");\n}\ncatch (Exception ex)\n    when (ex.Message.Contains("Test")) {\n    Console.WriteLine("Caught");\n}`,o:['Caught is printed because the when clause filter evaluates to true matching the exception message','The exception is not caught because the when clause filter evaluates to false','Compile error because the when clause is invalid syntax in C#','Runtime error because when clause cannot access exception properties like Message'],a:0,e:'The when clause (C# 6+) is an exception filter that evaluates before entering the catch block. Since "Test" contains "Test", the filter passes and "Caught" is printed.'},
{id:25,s:'B',st:'C# Advanced & Multithreading',q:'Which keyword prevents boxing?',o:['Generics prevent boxing by maintaining type specificity at compile time avoiding object type conversions','Using object type requires boxing for all value types stored in collections','Dynamic typing requires boxing for all value types at runtime','Var keyword performs boxing when inferring types for value type variables'],a:0,e:'Generics like List<int> store int values directly without boxing. Non-generic collections like ArrayList store everything as object, requiring boxing/unboxing for value types.'},

// Section C
{id:26,s:'C',st:'ASP.NET Core MVC & Web API',q:'What is the output of this middleware order?',c:`app.UseRouting();\napp.UseAuthentication();\napp.UseAuthorization();\napp.UseEndpoints();`,o:['This is the correct security order with routing first then authentication then authorization then endpoint execution','This order is wrong because authentication and authorization are in the wrong sequence','The middleware registration order has no effect on how requests are processed','This causes a compile error due to incorrect middleware registration sequence'],a:0,e:'The correct order is: UseRouting (match route) then UseAuthentication (identify user) then UseAuthorization (check permissions) then UseEndpoints (execute handler). This ensures auth happens before endpoint execution.'},
{id:27,s:'C',st:'ASP.NET Core MVC & Web API',q:'In controller code what does this return?',c:`[HttpGet]\npublic IActionResult Get() {\n    return Ok(new { Id = 1, Name = "CDAC" });\n}`,o:['Ok() returns HTTP 200 with the anonymous object serialized as JSON in the response body','It renders a Razor view template named Ok','It returns HTTP 404 Not Found because the route is not configured','It throws an exception because anonymous objects cannot be returned from API actions'],a:0,e:'Ok() creates an OkObjectResult that serializes the object to JSON when [ApiController] is present and returns HTTP 200. Anonymous objects are serialized with property names as JSON keys.'},
{id:28,s:'C',st:'ASP.NET Core MVC & Web API',q:'Purpose of this in Startup.cs:',c:`services.AddDbContext<AppDbContext>(\n    options =>\n        options.UseSqlServer(connectionString)\n);`,o:['This registers AppDbContext as a service in the DI container configured to use SQL Server with the provided connection string','This adds a controller class to the MVC pipeline configuration','This configures middleware for the HTTP request processing pipeline','This sets up URL routing patterns for the application endpoints'],a:0,e:'AddDbContext registers the EF Core DbContext with the DI container. By default it uses Scoped lifetime (one instance per HTTP request), which is the recommended pattern for database contexts.'},
{id:29,s:'C',st:'ASP.NET Core MVC & Web API',q:'What does this Razor code do?',c:`@model List<Product>\n@foreach(var item in Model) {\n    <p>@item.Name</p>\n}`,o:['It strongly types the view to List of Product and loops through each product rendering its Name in a paragraph element','It renders plain text without performing any data binding or iteration','It causes a Razor compilation error because the syntax is invalid','It outputs raw unprocessed HTML without executing the Razor directives'],a:0,e:'@model declares the view model type enabling IntelliSense and compile-time checking. The foreach loop iterates over the Model and renders each product name inside a paragraph tag.'},
{id:30,s:'C',st:'ASP.NET Core MVC & Web API',q:'Correct way to handle exception in action:',c:`[HttpGet]\npublic IActionResult Get() {\n    try { ... }\n    catch { return BadRequest(); }\n}`,o:['This approach is not recommended because global exception handling middleware is a cleaner and more maintainable solution','This is the best practice for handling all exceptions in ASP.NET Core controllers','Global exception middleware is not available in ASP.NET Core applications','Exception handling is not needed in API controller actions at all'],a:0,e:'While try-catch works, UseExceptionHandler middleware provides centralized exception handling. It avoids duplicating try-catch in every action, handles logging consistently, and returns standardized error responses.'},
{id:31,s:'C',st:'ASP.NET Core MVC & Web API',q:'What is the role of this attribute?',c:`[ApiController]\n[Route("api/[controller]")]\npublic class ValuesController\n    : ControllerBase { }`,o:'[ApiController] enables automatic HTTP 400 responses for validation errors, inferred parameter sources, and other API-specific conventions',o2:'[ApiController] only sets up the route prefix for all actions in the controller',o3:'[ApiController] enables Razor view rendering capabilities in API controllers',o4:'[ApiController] configures session state management for the controller',a:0,e:'[ApiController] enables convention-based behaviors: automatic model validation (400 on invalid), binding source inference ([FromBody] for complex types), and problem details for error responses.'},
{id:32,s:'C',st:'ASP.NET Core MVC & Web API',q:'Output / behavior of this:',c:`app.Use(async (context, next) => {\n    await next();\n    Console.WriteLine("After");\n});`,o:['After is printed after the next middleware in the pipeline completes its work and returns control','After is printed before the next middleware runs in the pipeline','After is never printed because the pipeline has already moved past this point','This code causes a runtime error due to incorrect middleware usage'],a:0,e:'Calling await next() passes control to subsequent middleware. When that middleware completes, execution resumes after the await. This pattern enables post-processing like logging or response modification.'},
{id:33,s:'C',st:'ASP.NET Core MVC & Web API',q:'Which returns file in Web API:',c:`return File(bytes,\n    "application/pdf", "file.pdf");`,o:['File() returns a FileContentResult that sends the byte array as a downloadable PDF file with the specified content type and filename','It serializes the byte array as a JSON array in the response body','It renders a Razor view that displays the file content in the browser','It returns the file content as plain text without any content type header'],a:0,e:'The File() helper creates a FileContentResult that writes bytes to the response with Content-Disposition set to attachment, prompting the browser to download the file with the given name.'},
{id:34,s:'C',st:'ASP.NET Core MVC & Web API',q:'Purpose of this in Program.cs:',c:`var app = builder.Build();\napp.UseHttpsRedirection();\napp.Run();`,o:['UseHttpsRedirection automatically redirects all HTTP requests to their HTTPS equivalent for enhanced security','UseHttpsRedirection configures the application to serve over HTTP only without HTTPS','UseHttpsRedirection configures static file serving from the wwwroot folder','UseHttpsRedirection sets up URL routing patterns for controller actions'],a:0,e:'UseHttpsRedirection middleware intercepts HTTP requests and returns a 301/307 redirect to the HTTPS URL. It should be used in production to enforce encrypted communication.'},
{id:35,s:'C',st:'ASP.NET Core MVC & Web API',q:'What does [FromQuery] do?',c:`public IActionResult Get(\n    [FromQuery] string search)`,o:['[FromQuery] binds the search parameter from URL query string values like ?search=value in the request','[FromQuery] binds the parameter from the JSON body of the request','[FromQuery] binds the parameter from route values like /api/values/{search}','[FromQuery] binds the parameter from HTTP request headers'],a:0,e:'[FromQuery] tells the model binder to extract the value from the URL query string. A request to /api/values?search=cdac binds "cdac" to the search parameter.'},

// Section D
{id:36,s:'D',st:'ADO.NET, EF, Security & Deployment',q:'Which is used for disconnected data?',o:['DataSet combined with DataAdapter provides a disconnected architecture that loads data into memory and works without an active database connection','DataReader is a connected forward-only reader that requires an open database connection throughout','Command executes SQL statements but does not store or cache any data in memory','Connection manages the database connection itself but does not store query results'],a:0,e:'DataSet is the core of ADO.NET disconnected architecture. DataAdapter fills it, closes the connection, and the app works with in-memory data. Changes sync back via DataAdapter.Update().' },
{id:37,s:'D',st:'ADO.NET, EF, Security & Deployment',q:'Correct migration command:',o:['Both dotnet ef migrations add Initial and Add-Migration Initial are valid commands for creating EF Core migrations depending on the tool being used','Only Update-Database is the correct command for creating new migrations','dotnet ef migrations add is the only valid CLI command and no other command exists','Add-Migration is the only valid Package Manager Console command for all migration operations'],a:0,e:'dotnet ef migrations add <name> is the CLI command and Add-Migration <name> is the PMC command. Both create migration files. Update-Database / dotnet ef database update applies them.'},
{id:38,s:'D',st:'ADO.NET, EF, Security & Deployment',q:'What does AsNoTracking() improve?',o:['AsNoTracking improves read performance by disabling change tracking which reduces memory overhead for query results that do not need modification','AsNoTracking improves write performance during SaveChanges operations','AsNoTracking enables lazy loading of navigation properties for related entities','AsNoTracking enables automatic model validation during query execution'],a:0,e:'Without change tracking, EF Core does not create snapshots or monitor entities for modifications. This reduces memory and speeds up queries when you only need to read data.'},
{id:39,s:'D',st:'ADO.NET, EF, Security & Deployment',q:'Which prevents CSRF?',o:['AntiForgeryToken generates a cryptographic token in forms that validates the request originated from the same application preventing Cross-Site Request Forgery','Authorize attribute handles authentication and authorization but does not prevent CSRF','CORS controls cross-origin resource sharing between different domains not request forgery','HTTPS encrypts communication but does not prevent Cross-Site Request Forgery attacks'],a:0,e:'ValidateAntiForgeryToken validates that the token in the form matches the cookie. Since attackers cannot read the cookie (same-origin policy), they cannot forge valid requests to protected endpoints.'},
{id:40,s:'D',st:'ADO.NET, EF, Security & Deployment',q:'Best deployment model for production:',o:['Self-contained publish on a Linux container provides portability, isolation, and does not require runtime installation on the host machine','Framework-dependent deployment only is sufficient for all production scenarios without exception','Deploying raw source code directly to the production server for compilation at runtime','IIS on Windows is the only viable production deployment option for .NET applications'],a:0,e:'Self-contained deployment in Docker containers offers portability, isolation, consistent behavior across environments, easy scaling via orchestration, and no runtime prerequisites on the host machine.'}
];

let ua={},rv={},sec=3600,ti=null,fin=false;
const L=['A','B','C','D'];
const $=id=>document.getElementById(id);
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function build(){
    let h='',ls='';
    D.forEach(q=>{
        if(q.s!==ls){ls=q.s;h+=`<div class="flex items-center gap-4 mt-10 mb-5"><div class="sline"></div><span class="slabel">Section ${q.s}: ${q.st}</span><div class="sline"></div></div>`}
        let ch=q.c?`<div class="cblock">${esc(q.c)}</div>`:'';
        let optsArr=q.o2?[q.o,q.o2,q.o3,q.o4]:q.o;
        let oh=optsArr.map((o,i)=>`<button class="obtn" data-q="${q.id}" data-o="${i}" onclick="pick(${q.id},${i})"><span class="olbl">${L[i]}</span><span>${esc(o)}</span></button>`).join('');
        h+=`<div class="qcard p-5 sm:p-7 mb-4" id="qc-${q.id}">
            <div class="flex items-start justify-between gap-3 mb-4">
                <p class="text-white font-medium text-sm sm:text-base leading-relaxed">${esc(q.q)}</p>
                <span class="qnum">Q${q.id}</span>
            </div>
            ${ch}
            <div class="grid gap-2.5 mb-4" id="op-${q.id}">${oh}</div>
            <div class="flex items-center justify-between">
                <button class="rbtn" id="rb-${q.id}" onclick="reveal(${q.id})"><i class="fa-solid fa-eye mr-1.5"></i>Show Answer</button>
                <span class="text-xs font-mono" style="color:var(--muted)" id="st-${q.id}"></span>
            </div>
            <div class="apanel" id="ap-${q.id}">
                <div class="rounded-xl px-4 py-3 flex items-center gap-3" style="background:rgba(16,185,129,.06);border:1px solid rgba(16,185,129,.12)">
                    <div class="w-7 h-7 rounded-md flex items-center justify-center flex-shrink-0" style="background:rgba(16,185,129,.15)"><i class="fa-solid fa-check text-emerald-400 text-xs"></i></div>
                    <div><span class="text-emerald-400 font-semibold text-sm">Correct Answer: </span><span class="text-white text-sm font-medium" id="at-${q.id}"></span></div>
                </div>
                <div class="expl-box"><p><i class="fa-solid fa-lightbulb text-amber-400/70 mr-2"></i>${esc(q.e)}</p></div>
            </div>
        </div>`;
    });
    $('qc').innerHTML=h;
    $('dots').innerHTML=D.map(q=>`<button class="ndot" id="d-${q.id}" title="Q${q.id}" onclick="sc(${q.id})"></button>`).join('');
}

function getOpts(qid){const q=D.find(x=>x.id===qid);return q.o2?[q.o,q.o2,q.o3,q.o4]:q.o}

function pick(qi,oi){
    if(fin||rv[qi])return;ua[qi]=oi;
    document.querySelectorAll(`[data-q="${qi}"]`).forEach((b,i)=>{b.classList.toggle('pk',i===oi)});stats();
}

function reveal(qi){
    if(rv[qi])return;rv[qi]=true;
    const q=D.find(x=>x.id===qi);const opts=getOpts(qi);
    const card=$(`qc-${qi}`),btn=$(`rb-${qi}`),st=$(`st-${qi}`),ap=$(`ap-${qi}`);
    $(`at-${qi}`).textContent=`${L[q.a]}. ${opts[q.a]}`;
    ap.classList.add('open');btn.classList.add('used');btn.innerHTML='<i class="fa-solid fa-eye-slash mr-1.5"></i>Revealed';
    document.querySelectorAll(`[data-q="${qi}"]`).forEach((b,i)=>{
        b.classList.remove('pk');b.classList.add('lk');
        if(i===q.a)b.classList.add('yes');
        else if(i===ua[qi]&&ua[qi]!==q.a)b.classList.add('nah');
    });
    if(ua[qi]!==undefined){
        if(ua[qi]===q.a){card.classList.add('ok');st.innerHTML='<span class="text-emerald-400"><i class="fa-solid fa-circle-check mr-1"></i>Correct</span>'}
        else{card.classList.add('no');st.innerHTML='<span class="text-red-400"><i class="fa-solid fa-circle-xmark mr-1"></i>Wrong</span>'}
    }else{st.innerHTML='<span style="color:var(--muted)"><i class="fa-solid fa-circle-minus mr-1"></i>Skipped</span>'}
    const dot=$(`d-${qi}`);if(dot){dot.classList.remove('dn');if(ua[qi]!==undefined&&ua[qi]===q.a)dot.classList.add('dc');else if(ua[qi]!==undefined)dot.classList.add('dw')}
    stats();
}

function sc(qi){const el=$(`qc-${qi}`);if(el)el.scrollIntoView({behavior:'smooth',block:'center'})}

function stats(){
    let c=0,w=0,n=0;
    D.forEach(q=>{if(rv[q.id]){n++;if(ua[q.id]!==undefined){if(ua[q.id]===q.a)c++;else w++}}});
    $('hC').textContent=c;$('hW').textContent=w;$('hS').textContent=40-n;
    $('pf').style.width=`${(n/40)*100}%`;
}

function startT(){sec=3600;upT();ti=setInterval(()=>{sec--;if(sec<=0){sec=0;clearInterval(ti);submit()}upT()},1000)}
function upT(){const m=Math.floor(sec/60),s=sec%60;$('tmr').textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;if(sec<=300)$('tmr').classList.add('tw');else $('tmr').classList.remove('tw')}

function submit(){
    if(fin)return;fin=true;clearInterval(ti);
    D.forEach(q=>{if(!rv[q.id])reveal(q.id)});
    let c=0,w=0,sk=0;
    D.forEach(q=>{if(ua[q.id]!==undefined){if(ua[q.id]===q.a)c++;else w++}else sk++});
    const pct=Math.round((c/40)*100);
    let g='F';if(pct>=90)g='A+';else if(pct>=80)g='A';else if(pct>=70)g='B+';else if(pct>=60)g='B';else if(pct>=50)g='C';else if(pct>=40)g='D';
    const ge=$('rG');ge.textContent=g;ge.className=pct<40?'gtxt gfail mb-1':'gtxt mb-1';
    $('rP').textContent=`${pct}% — ${c}/40 marks`;$('rC').textContent=c;$('rW').textContent=w;$('rS').textContent=sk;
    setTimeout(()=>$('resM').classList.remove('hidden'),300);
}

function revealAll(){D.forEach(q=>{if(!rv[q.id])reveal(q.id)});const b=$('raBtn');b.innerHTML='<i class="fa-solid fa-eye-slash mr-1"></i> All Revealed';b.style.color='#3fb950'}

function reset(){
    ua={};rv={};fin=false;clearInterval(ti);$('resM').classList.add('hidden');
    const b=$('raBtn');b.innerHTML='<i class="fa-solid fa-eye mr-1"></i> Reveal All';b.style.color='var(--muted)';
    build();stats();spy();startT();window.scrollTo({top:0,behavior:'smooth'});
}

function spy(){
    const obs=new IntersectionObserver(es=>{
        es.forEach(e=>{if(e.isIntersecting){
            const qi=parseInt(e.target.id.replace('qc-',''));
            document.querySelectorAll('.ndot').forEach(d=>d.classList.remove('dn'));
            const dot=$(`d-${qi}`);if(dot&&!dot.classList.contains('dc')&&!dot.classList.contains('dw'))dot.classList.add('dn');
        }});
    },{rootMargin:'-30% 0px -60% 0px'});
    D.forEach(q=>{const el=$(`qc-${q.id}`);if(el)obs.observe(el)});
}

 $('goBtn').addEventListener('click',()=>{$('startM').classList.add('hidden');$('app').classList.remove('hidden');build();stats();spy();startT()});
 $('subBtn').addEventListener('click',submit);
 $('raBtn').addEventListener('click',revealAll);
 $('rstBtn').addEventListener('click',reset);
 $('revBtn').addEventListener('click',()=>$('resM').classList.add('hidden'));
document.addEventListener('keydown',e=>{if(e.key==='Escape'&&!$('resM').classList.contains('hidden'))$('resM').classList.add('hidden')});
</script>
</body>
</html>
