    <style>
        :root{--bg:#0d1117;--card:#151b23;--border:#21262d;--accent:#10b981;--adim:rgba(16,185,129,.1);--red:#f85149;--blue:#58a6ff;--muted:#7d8590;--text:#e6edf3;--sub:#c9d1d9;--amber:#d29922}

        .obtn.yes{border-color:#238636;background:rgba(35,134,54,.12);color:#3fb950;opacity:1!important}
        .obtn.nah{border-color:var(--red);background:rgba(248,81,73,.1);color:#f85149;opacity:1!important}

        .obtn.nah .olbl{background:rgba(248,81,73,.2);color:#f85149}

        .rbtn:hover{border-color:var(--accent);color:#3fb950}
        .rbtn.used{opacity:.3;cursor:default;pointer-events:none}
        .apanel{max-height:0;overflow:hidden;opacity:0;transition:max-height .3s,opacity .25s,margin .25s;margin-top:0}
        .apanel.open{max-height:320px;opacity:1;margin-top:16px}
        .slabel{font-family:'JetBrains Mono',monospace;font-size:.68rem;font-weight:600;color:var(--blue);background:rgba(88,166,255,.08);border:1px solid rgba(88,166,255,.15);padding:5px 14px;border-radius:16px;white-space:nowrap;letter-spacing:.04em;text-transform:uppercase}
        .sline{flex:1;height:1px;background:linear-gradient(90deg,transparent,#21262d,transparent)}
        .ptrack{height:3px;background:#21262d;border-radius:2px;overflow:hidden}
        .pfill{height:100%;background:linear-gradient(90deg,#10b981,#58a6ff);border-radius:2px;transition:width .3s}
        .qnum{font-family:'JetBrains Mono',monospace;font-size:.63rem;font-weight:700;color:var(--muted);background:rgba(125,133,144,.08);border:1px solid rgba(125,133,144,.12);padding:2px 8px;border-radius:5px}
        .ndot{width:8px;height:8px;border-radius:50%;background:#30363d;cursor:pointer;border:none;padding:0;transition:background .15s,transform .15s}
        .ndot:hover{background:#484f58;transform:scale(1.3)}
        .ndot.dc{background:#238636}
        .ndot.dw{background:var(--red)}
        .ndot.dn{background:var(--blue);transform:scale(1.4);box-shadow:0 0 6px rgba(88,166,255,.4)}
        @keyframes tp{0%,100%{color:var(--red)}50%{color:#fb923c}}
        .tw{animation:tp 1s ease-in-out infinite}
        .gtxt{font-size:3.5rem;font-weight:800;line-height:1;background:linear-gradient(135deg,#10b981,#58a6ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        .gfail{background:linear-gradient(135deg,#f85149,#f97316);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        .cblock{background:#0d1117;border:1px solid #21262d;border-radius:8px;padding:12px 16px;font-family:'JetBrains Mono',monospace;font-size:.76rem;line-height:1.65;color:var(--sub);overflow-x:auto;margin-bottom:14px;white-space:pre}
        .expl-box{background:rgba(88,166,255,.04);border:1px solid rgba(88,166,255,.1);border-radius:10px;padding:12px 16px;margin-top:10px}
        .expl-box p{font-size:.84rem;line-height:1.65;color:#8b949e}
        @media(max-width:640px){.sbox{min-width:78px;padding:10px 8px}}

<script>
const D=[
{id:1,s:'A',st:'C# & .NET Fundamentals',
q:'Which keyword declares constant?',
o:['const declares a compile-time constant that must be initialized at declaration and cannot be changed','readonly declares a runtime read-only field settable in constructor','static declares a member belonging to the type rather than instances','sealed prevents a class from being inherited'],a:0,
e:'const creates compile-time constants that are embedded directly in the calling code. They must be initialized at declaration with a value known at compile time.'},
{id:2,s:'A',st:'C# & .NET Fundamentals',
q:'What is object initializer?',
o:['new Class { Prop = value } syntax sets public properties during object creation without calling a parameterized constructor','Class obj = new is incomplete syntax missing the type or initializer','Class.Prop = value requires an existing instance and sets a single static property','initialize Class is not valid C# syntax'],a:0,
e:'Object initializers allow setting accessible fields and properties at creation time: var obj = new Person { Name = "John", Age = 25 }. The compiler generates the appropriate property assignments.'},
{id:3,s:'A',st:'C# & .NET Fundamentals',
q:'Output of code:',
c:`short s = 30000;\nshort s2 = (short)(s + 1000);\nConsole.WriteLine(s2);`,
o:['31000 because 30000 plus 1000 equals 31000 which is within the valid range of short from -32768 to 32767','-34536 would indicate overflow but 31000 does not exceed the short maximum','30000 ignoring the addition','Exception would not occur since the result fits in short'],a:0,
e:'s + 1000 promotes to int giving 31000. Since 31000 is within the short range (-32768 to 32767), the explicit cast (short) safely produces 31000 without overflow.'},
{id:4,s:'A',st:'C# & .NET Fundamentals',
q:'Role of abstract class:',
o:['An abstract class cannot be instantiated directly and must be inherited by a derived class that implements its abstract members','An abstract class cannot be instantiated but inheritance is optional','An abstract class must always be inherited even if it has no abstract members','An abstract class has no special rules regarding instantiation or inheritance'],a:0,
e:'Abstract classes are designed to be base classes. They cannot be instantiated with new, and any concrete derived class must implement all abstract members declared in the base.'},
{id:5,s:'A',st:'C# & .NET Fundamentals',
q:'Keyword for runtime polymorphism:',
o:['virtual in base class and override in derived class together enable runtime polymorphism through method dispatch','new keyword is used for method hiding not polymorphism','sealed prevents overriding which restricts polymorphism','static members do not participate in polymorphism'],a:0,
e:'Runtime polymorphism is achieved by declaring a method as virtual in the base class and overriding it in the derived class. The actual method called is determined at runtime based on the object type.'},
{id:6,s:'A',st:'C# & .NET Fundamentals',
q:'Output of following:',
c:`bool b = true;\nConsole.WriteLine(b.ToString() == "True");`,
o:['True because bool.ToString() returns "True" which matches the string literal exactly','False because the comparison is case-sensitive and returns a different value','Exception because comparing bool string to string literal is invalid','1 because bool is implicitly converted to integer'],a:0,
e:'bool.ToString() returns "True" (capitalized) for true and "False" for false. The == operator performs content comparison, so "True" == "True" evaluates to true.'},
{id:7,s:'A',st:'C# & .NET Fundamentals',
q:'Default access of interface members:',
o:['Interface members are implicitly public and cannot have any other access modifier','Interface members default to private','Interface members default to internal access','Interface members default to protected access'],a:0,
e:'All members of an interface are implicitly public. Adding any access modifier (private, protected, internal) to an interface member causes a compile error.'},
{id:8,s:'A',st:'C# & .NET Fundamentals',
q:'What is tuple?',
o:['Tuple is a lightweight data structure that groups multiple values of potentially different types into a single object','Tuple is a collection that stores elements of the same type with dynamic sizing','Tuple is a fixed-size array with elements of the same type','Tuple is a class that requires explicit definition with named properties'],a:0,
e:'Tuples provide a concise way to group multiple values without defining a separate class or struct. ValueTuple (C# 7+) is lightweight and allocated on the stack.'},
{id:9,s:'A',st:'C# & .NET Fundamentals',
q:'Which supports operator overloading?',
o:['Both class and struct can define overloaded operators using the public static keyword','Only interface can overload operators','Enum types support operator overloading','Delegate types support operator overloading'],a:0,
e:'Operator overloading is supported by classes and structs using the public static returnType operator op(params) syntax. Interfaces, enums, and delegates cannot overload operators.'},
{id:10,s:'A',st:'C# & .NET Fundamentals',
q:'Purpose of checked keyword:',
o:['checked enables runtime overflow checking for arithmetic operations throwing OverflowException if detected','checked disables overflow checking allowing silent wrapping','checked performs type checking at compile time','checked validates that a variable is not null'],a:0,
e:'In a checked context, arithmetic operations that overflow throw System.OverflowException instead of silently wrapping. This is useful for catching unexpected overflows.'},
{id:11,s:'A',st:'C# & .NET Fundamentals',
q:'Which is not a valid modifier?',
o:['public is a valid access modifier in C#','friend is not a valid modifier in C# as it belongs to C++ not C#','internal is a valid access modifier restricting access to the same assembly','protected is a valid access modifier allowing access in derived classes'],a:1,
e:'friend is a C++ access specifier that does not exist in C#. C# uses internal for assembly-level access. The other three (public, internal, protected) are all valid C# modifiers.'},
{id:12,s:'A',st:'C# & .NET Fundamentals',
q:'Output of code:',
c:`string s1 = "hello";\nstring s2 = s1;\ns1 = "world";\nConsole.WriteLine(s2);`,
o:['hello because string assignment copies the reference and reassigning s1 does not affect s2','world because strings are reference types and share the same value','null because the original string is garbage collected','Exception because string reassignment invalidates the reference'],a:0,
e:'String assignment copies the reference. s2 points to "hello". When s1 is reassigned to "world", it points to a new string object. s2 still references the original "hello".'},
{id:13,s:'A',st:'C# & .NET Fundamentals',
q:'What does String.Concat do?',
o:['String.Concat joins multiple strings into a single new string without modifying any original strings','String.Concat modifies the original string in place','String.Concat splits a string into substrings','String.Concat compares two strings for equality'],a:0,
e:'String.Concat creates and returns a new string by combining the provided strings. Since strings are immutable, the original strings remain unchanged.'},
{id:14,s:'A',st:'C# & .NET Fundamentals',
q:'Correct way to compare two strings:',
o:['Both string.Equals and the == operator correctly compare string content in C#','Only string.Equals method performs proper string comparison','Only the == operator works for string comparison','ReferenceEquals is the correct way to compare strings'],a:0,
e:'In C#, both string.Equals() and the == operator are overloaded to perform content (value) comparison for strings, not reference comparison. Both produce the same result.'},
{id:15,s:'A',st:'C# & .NET Fundamentals',
q:'Which is not a reference type?',
o:['interface is a reference type defining a contract','delegate is a reference type holding method references','struct is a value type stored on the stack not a reference type','class is a reference type instantiated on the heap'],a:2,
e:'Struct is a value type in C#. It is stored on the stack (or inline) and copied by value. Interface, delegate, and class are all reference types stored on the heap.'},

// Section B
{id:16,s:'B',st:'C# Advanced Concepts',
q:'What is Action delegate?',
o:['Action delegate encapsulates a method that takes parameters but returns no value (void return type)','Action delegate has a return type unlike Func','Action delegate is the same as Predicate delegate','Action delegate is another name for Func delegate'],a:0,
e:'Action<T> delegates accept parameters of type T and return void. They are commonly used for callbacks, event handlers, and LINQ operations like ForEach.'},
{id:17,s:'B',st:'C# Advanced Concepts',
q:'LINQ method for first element:',
o:['FirstOrDefault returns the first element or a default value if the sequence is empty avoiding an exception','Single returns exactly one element and throws if there are zero or more than one','Last returns the last element and throws if the sequence is empty','ElementAt returns the element at a specific index and throws if out of range'],a:0,
e:'FirstOrDefault() is the safe way to get the first element. It returns default(T) (null for reference types, 0 for value types) instead of throwing when the sequence is empty.'},
{id:18,s:'B',st:'C# Advanced Concepts',
q:'Purpose of StreamWriter:',
o:['StreamWriter writes text data to a file or stream using a buffered approach for efficiency','StreamWriter reads byte data from files','StreamWriter operates only in memory without file system access','StreamWriter writes binary data to files'],a:0,
e:'StreamWriter is a character-based output stream that writes text to files. It uses buffering internally and provides methods like Write, WriteLine, and WriteAsync.'},
{id:19,s:'B',st:'C# Advanced Concepts',
q:'What is CancellationToken?',
o:['CancellationToken is used to signal cancellation of asynchronous operations cooperatively','CancellationToken creates and starts a new Task','CancellationToken introduces an asynchronous delay','CancellationToken acquires a mutual exclusion lock for thread safety'],a:0,
e:'CancellationToken enables cooperative cancellation. The caller creates a CancellationTokenSource and passes its Token to async methods, which check IsCancellationRequested periodically and stop gracefully.'},
{id:20,s:'B',st:'C# Advanced Concepts',
q:'Output of this:',
c:`List<int> list = new List<int>{10,20,30};\nlist.Insert(1, 25);\nConsole.WriteLine(list[1]);`,
o:['20 is wrong because Insert shifts existing elements','25 is correct because Insert at index 1 places 25 there and shifts 20 to index 2','10 is at index 0 not index 1','Exception would not occur'],a:1,
e:'Insert(1, 25) inserts 25 at index 1, shifting the existing element at index 1 (20) and all subsequent elements to the right. The list becomes {10, 25, 20, 30}.'},
{id:21,s:'B',st:'C# Advanced Concepts',
q:'What is assembly?',
o:['Assembly is a compiled unit of .NET code packaged as a DLL or EXE containing metadata and IL code','Assembly is a raw source code file before compilation','Assembly is a namespace that organizes types within a project','Assembly is a single class definition in a C# project'],a:0,
e:'An assembly is the fundamental unit of deployment in .NET. It contains compiled IL code, type metadata (manifest), and resources, packaged as a .dll or .exe file.'},
{id:22,s:'B',st:'C# Advanced Concepts',
q:'Which is thread safe collection?',
o:['ConcurrentBag is a thread-safe unordered collection from System.Collections.Concurrent namespace','List is not thread-safe for concurrent writes','ArrayList is not thread-safe for concurrent operations','Dictionary is not thread-safe for concurrent access'],a:0,
e:'ConcurrentBag<T> is part of System.Collections.Concurrent and provides thread-safe operations without explicit locking. It is optimized for scenarios where the same thread both adds and removes items.'},
{id:23,s:'B',st:'C# Advanced Concepts',
q:'Purpose of expression tree:',
o:['Expression trees represent code as a data structure and are used by LINQ providers to translate queries into other domains like SQL','Expression trees are only used for compiling LINQ queries in memory','Expression trees are primarily for exception handling','Expression trees throw exceptions at runtime'],a:0,
e:'Expression trees (Expression<TDelegate>) represent code as an abstract syntax tree. LINQ providers like EF Core parse these trees to translate C# expressions into SQL or other query languages.'},
{id:24,s:'B',st:'C# Advanced Concepts',
q:'What does Interlocked class provide?',
o:['Interlocked provides atomic operations on shared variables such as Increment, Decrement, Exchange, and CompareExchange','Interlocked puts the current thread to sleep','Interlocked joins multiple threads together','Interlocked starts a new background thread'],a:0,
e:'The Interlocked class provides atomic operations that are indivisible — they complete without interruption from other threads, preventing race conditions on shared variables.'},
{id:25,s:'B',st:'C# Advanced Concepts',
q:'Which is true for IDisposable?',
o:['IDisposable defines the Dispose method for explicit release of unmanaged resources like file handles and database connections','IDisposable is the same as a finalizer which is called by the garbage collector','Both Dispose and finalizer are recommended for all classes','IDisposable automatically cleans up resources without any code'],a:0,
e:'IDisposable provides the Dispose() method for deterministic cleanup. Unlike finalizers (which are non-deterministic), Dispose lets the caller explicitly release resources when they are no longer needed.'},

// Section C
{id:26,s:'C',st:'ASP.NET Core MVC & Web API',
q:'Which is used for API versioning?',
o:['ApiVersion attribute or URL-based versioning configures different versions of the same API endpoint','Route attribute defines URL patterns but does not handle versioning directly','HttpGet attribute maps to HTTP GET method only','Controller attribute marks a class as a controller but does not version it'],a:0,
e:'API versioning in ASP.NET Core can be done via URL segment (/api/v1/...), query parameter (?api-version=1), HTTP header, or media type. Libraries like Microsoft.AspNetCore.Mvc.Versioning simplify this.'},
{id:27,s:'C',st:'ASP.NET Core MVC & Web API',
q:'Purpose of wwwroot folder:',
o:['wwwroot folder contains static files like CSS, JavaScript, images, and libraries served directly by the web server','wwwroot folder contains controller classes','wwwroot folder contains entity model definitions','wwwroot folder contains Razor view templates'],a:0,
e:'The wwwroot folder is the default web root for static files. UseStaticFiles() middleware serves files from this folder directly to clients without going through MVC routing.'},
{id:28,s:'C',st:'ASP.NET Core MVC & Web API',
q:'Attribute for hidden input:',
o:['Both HiddenInput and BindNever can prevent a property from being rendered in an HTML form','HiddenInput is the only attribute that hides form fields','BindNever is the only attribute that prevents model binding','None of these attributes exist in ASP.NET Core'],a:0,
e:'[HiddenInput(DisplayValue=false)] renders a hidden input field. [BindNever] prevents the property from being bound during model binding entirely. Both keep the property out of visible form fields.'},
{id:29,s:'C',st:'ASP.NET Core MVC & Web API',
q:'What does UseDeveloperExceptionPage do?',
o:['UseDeveloperExceptionPage shows detailed error information including stack traces in the development environment only','UseDeveloperExceptionPage configures production-level error handling','UseDeveloperExceptionPage enables structured logging for errors','UseDeveloperExceptionPage sets up URL routing for error pages'],a:0,
e:'This middleware should only be enabled in development. It captures exceptions and displays a detailed error page with request details, stack trace, and cookies — useful for debugging but a security risk in production.'},
{id:30,s:'C',st:'ASP.NET Core MVC & Web API',
q:'Correct status code for no content:',
o:['NoContent returns HTTP 204 indicating the request succeeded but there is no content in the response body','Ok returns HTTP 200 with optional content','NotFound returns HTTP 404 when a resource is not found','BadRequest returns HTTP 400 for invalid input'],a:0,
e:'HTTP 204 (No Content) is used when the server successfully processed the request but has no additional content to return, such as after a successful DELETE operation.'},
{id:31,s:'C',st:'ASP.NET Core MVC & Web API',
q:'Purpose of Tag Helper:',
o:['Tag Helpers are server-side components that process HTML elements and attributes to generate or modify HTML output','Tag Helpers are client-side JavaScript libraries','Tag Helpers are CSS preprocessing tools','Tag Helpers are JavaScript frameworks for DOM manipulation'],a:0,
e:'Tag Helpers run on the server and attach to HTML elements via attributes like asp-for, asp-action, asp-route. They enable clean, HTML-friendly syntax compared to @Html helper methods.'},
{id:32,s:'C',st:'ASP.NET Core MVC & Web API',
q:'What is SignalR?',
o:['SignalR is an ASP.NET Core library for adding real-time web functionality like live chat and dashboards using WebSockets','SignalR is a database ORM for .NET applications','SignalR handles authentication and authorization only','SignalR is a server-side caching library'],a:0,
e:'SignalR simplifies real-time communication between server and clients. It automatically chooses the best transport (WebSockets, Server-Sent Events, or Long Polling) and handles connection management.'},
{id:33,s:'C',st:'ASP.NET Core MVC & Web API',
q:'Which attribute restricts HTTP methods?',
o:['Both AcceptVerbs and specific method attributes like HttpPost and HttpGet restrict which HTTP methods an action accepts','Only AcceptVerbs attribute restricts HTTP methods','Only HttpPost attribute restricts HTTP methods','Route attribute restricts HTTP methods'],a:0,
e:'[AcceptVerbs("GET","POST")] restricts to specific methods. Individual attributes like [HttpGet], [HttpPost], [HttpPut], [HttpDelete] achieve the same for single methods. Both approaches are valid.'},
{id:34,s:'C',st:'ASP.NET Core MVC & Web API',
q:'How to bind complex object?',
o:['Both FromBody for JSON payloads and FromForm for form-encoded data can bind complex objects to action parameters','Only FromBody can bind complex objects','Only FromForm can bind complex objects','Query string binding is the only way for complex objects'],a:0,
e:'[FromBody] deserializes JSON request body into a complex object. [FromForm] binds form-encoded data (like from HTML forms with multipart/form-data) into a complex object.'},
{id:35,s:'C',st:'ASP.NET Core MVC & Web API',
q:'What is Razor component?',
o:['Razor component is a Blazor UI building block combining HTML markup and C# logic in a .razor file','Razor component is the same as an MVC Razor view','Razor component is only for Web API endpoints','Razor component is a static HTML file without server-side logic'],a:0,
e:'Razor components (.razor files) are the foundation of Blazor UI. They contain HTML markup interleaved with C# code, support data binding, event handling, and lifecycle methods — similar to React or Vue components.'},

// Section D
{id:36,s:'D',st:'ADO.NET, EF, Multithreading & Others',
q:'Which executes scalar query?',
o:['ExecuteScalar returns the first column of the first row from a query useful for aggregate functions like COUNT or MAX','ExecuteReader returns a forward-only reader for multiple rows and columns','ExecuteNonQuery executes INSERT, UPDATE, DELETE returning affected row count','Fill method populates a DataSet with multiple result sets'],a:0,
e:'ExecuteScalar() is optimized for queries that return a single value, such as SELECT COUNT(*) FROM Table or SELECT SCOPE_IDENTITY(). It avoids the overhead of creating a full reader.'},
{id:37,s:'D',st:'ADO.NET, EF, Multithreading & Others',
q:'What is Fluent API in EF?',
o:['Fluent API provides a code-based way to configure entity models in EF Core as an alternative to data annotations','Fluent API is the same as data annotation attributes','Fluent API combines code-based configuration with data annotations','Fluent API is used only for writing raw SQL queries'],a:0,
e:'Fluent API in EF Core (accessed via modelBuilder in OnModelCreating) allows detailed configuration like composite keys, relationships, indexing, and constraints that may not be possible with attributes alone.'},
{id:38,s:'D',st:'ADO.NET, EF, Multithreading & Others',
q:'Purpose of Parallel.Invoke:',
o:['Parallel.Invoke executes multiple actions concurrently across available CPU cores for CPU-bound parallelism','Parallel.Invoke executes actions sequentially one after another','Parallel.Invoke is only for asynchronous I/O-bound operations','Parallel.Invoke runs all actions on a single thread'],a:0,
e:'Parallel.Invoke takes an array of Action delegates and executes them in parallel using the thread pool. It blocks until all actions complete and is ideal for independent CPU-bound operations.'},
{id:39,s:'D',st:'ADO.NET, EF, Multithreading & Others',
q:'Which file format for publish profile?',
o:['pubxml is the XML-based file format used for Visual Studio publish profiles','json is used for appsettings not publish profiles','config is used for .NET Framework configuration not publish profiles','Only XML without the pubxml extension is valid for profiles'],a:0,
e:'Publish profiles in Visual Studio use the .pubxml format stored in the Properties/PublishProfiles folder. They define target framework, runtime, deployment method, and connection settings for publishing.'},
{id:40,s:'D',st:'ADO.NET, EF, Multithreading & Others',
q:'Best way to handle global exception?',
o:'Middleware-based exception handling with UseExceptionHandler provides a centralized, pipeline-integrated approach for catching unhandled exceptions globally',
o2:'try-catch blocks in every controller method is repetitive and error-prone',
o3:'Application_Error in Global.asax is the legacy ASP.NET Framework approach not used in ASP.NET Core',
o4:'Web.config customErrors section is the legacy ASP.NET Framework approach not available in ASP.NET Core',
a:0,
e:'In ASP.NET Core, UseExceptionHandler middleware catches unhandled exceptions globally and routes them to a custom error handling endpoint or page. This is cleaner than wrapping every action in try-catch.'}
];

let ua={},rv={},sec=3600,ti=null,fin=false;
const L=['A','B','C','D'];
const $=id=>document.getElementById(id);
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function build(){
    let h='',ls='';
    D.forEach(q=>{
        if(q.s!==ls){ls=q.s;h+=`<div class="flex items-center gap-4 mt-10 mb-5"><div class="sline"></div><span class="slabel">Section ${q.s}: ${q.st}</span><div class="sline"></div></div>`}
        let ch=q.c?`<div class="cblock">${esc(q.c)}</div>`:'';
        let optsArr=q.o2?[q.o,q.o2,q.o3,q.o4]:q.o;
        let oh=optsArr.map((o,i)=>`<button class="obtn" data-q="${q.id}" data-o="${i}" onclick="pick(${q.id},${i})"><span class="olbl">${L[i]}</span><span>${esc(o)}</span></button>`).join('');
        h+=`<div class="qcard p-5 sm:p-7 mb-4" id="qc-${q.id}">
            <div class="flex items-start justify-between gap-3 mb-4">
                <p class="text-white font-medium text-sm sm:text-base leading-relaxed">${esc(q.q)}</p>
                <span class="qnum">Q${q.id}</span>
            </div>
            ${ch}
            <div class="grid gap-2.5 mb-4" id="op-${q.id}">${oh}</div>
            <div class="flex items-center justify-between">
                <button class="rbtn" id="rb-${q.id}" onclick="reveal(${q.id})"><i class="fa-solid fa-eye mr-1.5"></i>Show Answer</button>
                <span class="text-xs font-mono" style="color:var(--muted)" id="st-${q.id}"></span>
            </div>
            <div class="apanel" id="ap-${q.id}">
                <div class="rounded-xl px-4 py-3 flex items-center gap-3" style="background:rgba(16,185,129,.06);border:1px solid rgba(16,185,129,.12)">
                    <div class="w-7 h-7 rounded-md flex items-center justify-center flex-shrink-0" style="background:rgba(16,185,129,.15)"><i class="fa-solid fa-check text-emerald-400 text-xs"></i></div>
                    <div><span class="text-emerald-400 font-semibold text-sm">Correct Answer: </span><span class="text-white text-sm font-medium" id="at-${q.id}"></span></div>
                </div>
                <div class="expl-box"><p><i class="fa-solid fa-lightbulb text-amber-400/70 mr-2"></i>${esc(q.e)}</p></div>
            </div>
        </div>`;
    });
    $('qc').innerHTML=h;
    $('dots').innerHTML=D.map(q=>`<button class="ndot" id="d-${q.id}" title="Q${q.id}" onclick="sc(${q.id})"></button>`).join('');
}

function getOpts(qid){
    const q=D.find(x=>x.id===qid);
    return q.o2?[q.o,q.o2,q.o3,q.o4]:q.o;
}

function pick(qi,oi){
    if(fin||rv[qi])return;
    ua[qi]=oi;
    document.querySelectorAll(`[data-q="${qi}"]`).forEach((b,i)=>{b.classList.toggle('pk',i===oi)});
    stats();
}

function reveal(qi){
    if(rv[qi])return;
    rv[qi]=true;
    const q=D.find(x=>x.id===qi);
    const opts=getOpts(qi);
    const card=$(`qc-${qi}`),btn=$(`rb-${qi}`),st=$(`st-${qi}`),ap=$(`ap-${qi}`);
    $(`at-${qi}`).textContent=`${L[q.a]}. ${opts[q.a]}`;
    ap.classList.add('open');
    btn.classList.add('used');
    btn.innerHTML='<i class="fa-solid fa-eye-slash mr-1.5"></i>Revealed';
    document.querySelectorAll(`[data-q="${qi}"]`).forEach((b,i)=>{
        b.classList.remove('pk');b.classList.add('lk');
        if(i===q.a)b.classList.add('yes');
        else if(i===ua[qi]&&ua[qi]!==q.a)b.classList.add('nah');
    });
    if(ua[qi]!==undefined){
        if(ua[qi]===q.a){card.classList.add('ok');st.innerHTML='<span class="text-emerald-400"><i class="fa-solid fa-circle-check mr-1"></i>Correct</span>'}
        else{card.classList.add('no');st.innerHTML='<span class="text-red-400"><i class="fa-solid fa-circle-xmark mr-1"></i>Wrong</span>'}
    }else{st.innerHTML='<span style="color:var(--muted)"><i class="fa-solid fa-circle-minus mr-1"></i>Skipped</span>'}
    const dot=$(`d-${qi}`);
    if(dot){dot.classList.remove('dn');if(ua[qi]!==undefined&&ua[qi]===q.a)dot.classList.add('dc');else if(ua[qi]!==undefined)dot.classList.add('dw')}
    stats();
}

function sc(qi){const el=$(`qc-${qi}`);if(el)el.scrollIntoView({behavior:'smooth',block:'center'})}

function stats(){
    let c=0,w=0,n=0;
    D.forEach(q=>{if(rv[q.id]){n++;if(ua[q.id]!==undefined){if(ua[q.id]===q.a)c++;else w++}}});
    $('hC').textContent=c;$('hW').textContent=w;$('hS').textContent=40-n;
    $('pf').style.width=`${(n/40)*100}%`;
}

function startT(){
    sec=3600;upT();
    ti=setInterval(()=>{sec--;if(sec<=0){sec=0;clearInterval(ti);submit()}upT()},1000);
}
function upT(){
    const m=Math.floor(sec/60),s=sec%60;
    $('tmr').textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    if(sec<=300)$('tmr').classList.add('tw');else $('tmr').classList.remove('tw');
}

function submit(){
    if(fin)return;fin=true;clearInterval(ti);
    D.forEach(q=>{if(!rv[q.id])reveal(q.id)});
    let c=0,w=0,sk=0;
    D.forEach(q=>{if(ua[q.id]!==undefined){if(ua[q.id]===q.a)c++;else w++}else sk++});
    const pct=Math.round((c/40)*100);
    let g='F';if(pct>=90)g='A+';else if(pct>=80)g='A';else if(pct>=70)g='B+';else if(pct>=60)g='B';else if(pct>=50)g='C';else if(pct>=40)g='D';
    const ge=$('rG');ge.textContent=g;ge.className=pct<40?'gtxt gfail mb-1':'gtxt mb-1';
    $('rP').textContent=`${pct}% — ${c}/40 marks`;
    $('rC').textContent=c;$('rW').textContent=w;$('rS').textContent=sk;
    setTimeout(()=>$('resM').classList.remove('hidden'),300);
}

function revealAll(){
    D.forEach(q=>{if(!rv[q.id])reveal(q.id)});
    const b=$('raBtn');b.innerHTML='<i class="fa-solid fa-eye-slash mr-1"></i> All Revealed';b.style.color='#3fb950';
}

function reset(){
    ua={};rv={};fin=false;clearInterval(ti);
    $('resM').classList.add('hidden');
    const b=$('raBtn');b.innerHTML='<i class="fa-solid fa-eye mr-1"></i> Reveal All';b.style.color='var(--muted)';
    build();stats();spy();startT();window.scrollTo({top:0,behavior:'smooth'});
}

function spy(){
    const obs=new IntersectionObserver(es=>{
        es.forEach(e=>{if(e.isIntersecting){
            const qi=parseInt(e.target.id.replace('qc-',''));
            document.querySelectorAll('.ndot').forEach(d=>d.classList.remove('dn'));
            const dot=$(`d-${qi}`);if(dot&&!dot.classList.contains('dc')&&!dot.classList.contains('dw'))dot.classList.add('dn');
        }});
    },{rootMargin:'-30% 0px -60% 0px'});
    D.forEach(q=>{const el=$(`qc-${q.id}`);if(el)obs.observe(el)});
}

 $('goBtn').addEventListener('click',()=>{$('startM').classList.add('hidden');$('app').classList.remove('hidden');build();stats();spy();startT()});
 $('subBtn').addEventListener('click',submit);
 $('raBtn').addEventListener('click',revealAll);
 $('rstBtn').addEventListener('click',reset);
 $('revBtn').addEventListener('click',()=>$('resM').classList.add('hidden'));
document.addEventListener('keydown',e=>{if(e.key==='Escape'&&!$('resM').classList.contains('hidden'))$('resM').classList.add('hidden')});
</script>
</body>
</html>
