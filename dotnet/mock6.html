<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CDAC CCE Mock 6 — .NET Technologies</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script>
        tailwind.config={theme:{extend:{fontFamily:{display:['Space Grotesk','sans-serif'],mono:['JetBrains Mono','monospace']}}}}
    </script>
    <style>
        :root{--bg:#0d1117;--card:#151b23;--border:#21262d;--accent:#10b981;--adim:rgba(16,185,129,.1);--red:#f85149;--blue:#58a6ff;--muted:#7d8590;--text:#e6edf3;--sub:#c9d1d9;--amber:#d29922}
        *{box-sizing:border-box;margin:0}
        body{background:var(--bg);font-family:'Space Grotesk',sans-serif;color:var(--text)}
        ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:#30363d;border-radius:3px}
        .mblur{background:rgba(0,0,0,.8);backdrop-filter:blur(10px)}
        .qcard{background:var(--card);border:1px solid var(--border);border-radius:12px;transition:border-color .2s}
        .qcard:hover{border-color:#30363d}
        .qcard.ok{border-color:#238636}
        .qcard.no{border-color:var(--red)}
        .obtn{background:rgba(21,27,35,.7);border:1px solid var(--border);border-radius:10px;padding:11px 14px;text-align:left;cursor:pointer;width:100%;color:var(--sub);font-family:'Space Grotesk',sans-serif;font-size:.88rem;line-height:1.55;display:flex;align-items:flex-start;gap:10px;transition:border-color .15s,background .15s}
        .obtn:hover:not(.lk){border-color:#484f58;background:rgba(21,27,35,1)}
        .obtn.pk{border-color:var(--accent);background:var(--adim);color:#3fb950}
        .obtn.lk{cursor:default;opacity:.7}
        .obtn.lk:hover{border-color:var(--border);background:rgba(21,27,35,.7)}
        .obtn.yes{border-color:#238636;background:rgba(35,134,54,.12);color:#3fb950;opacity:1!important}
        .obtn.nah{border-color:var(--red);background:rgba(248,81,73,.1);color:#f85149;opacity:1!important}
        .olbl{flex-shrink:0;width:26px;height:26px;border-radius:6px;background:rgba(125,133,144,.1);display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-weight:600;font-size:.75rem;color:var(--muted);transition:all .15s}
        .obtn.pk .olbl{background:rgba(16,185,129,.2);color:#3fb950}
        .obtn.yes .olbl{background:rgba(35,134,54,.25);color:#3fb950}
        .obtn.nah .olbl{background:rgba(248,81,73,.2);color:#f85149}
        .rbtn{background:transparent;border:1px solid #30363d;border-radius:8px;color:var(--muted);padding:7px 16px;cursor:pointer;font-family:'Space Grotesk',sans-serif;font-size:.8rem;font-weight:500;transition:border-color .15s,color .15s}
        .rbtn:hover{border-color:var(--accent);color:#3fb950}
        .rbtn.used{opacity:.3;cursor:default;pointer-events:none}
        .apanel{max-height:0;overflow:hidden;opacity:0;transition:max-height .3s,opacity .25s,margin .25s;margin-top:0}
        .apanel.open{max-height:320px;opacity:1;margin-top:16px}
        .slabel{font-family:'JetBrains Mono',monospace;font-size:.68rem;font-weight:600;color:var(--blue);background:rgba(88,166,255,.08);border:1px solid rgba(88,166,255,.15);padding:5px 14px;border-radius:16px;white-space:nowrap;letter-spacing:.04em;text-transform:uppercase}
        .sline{flex:1;height:1px;background:linear-gradient(90deg,transparent,#21262d,transparent)}
        .ptrack{height:3px;background:#21262d;border-radius:2px;overflow:hidden}
        .pfill{height:100%;background:linear-gradient(90deg,#10b981,#58a6ff);border-radius:2px;transition:width .3s}
        .qnum{font-family:'JetBrains Mono',monospace;font-size:.63rem;font-weight:700;color:var(--muted);background:rgba(125,133,144,.08);border:1px solid rgba(125,133,144,.12);padding:2px 8px;border-radius:5px}
        .ndot{width:8px;height:8px;border-radius:50%;background:#30363d;cursor:pointer;border:none;padding:0;transition:background .15s,transform .15s}
        .ndot:hover{background:#484f58;transform:scale(1.3)}
        .ndot.dc{background:#238636}
        .ndot.dw{background:var(--red)}
        .ndot.dn{background:var(--blue);transform:scale(1.4);box-shadow:0 0 6px rgba(88,166,255,.4)}
        @keyframes tp{0%,100%{color:var(--red)}50%{color:#fb923c}}
        .tw{animation:tp 1s ease-in-out infinite}
        .gtxt{font-size:3.5rem;font-weight:800;line-height:1;background:linear-gradient(135deg,#10b981,#58a6ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        .gfail{background:linear-gradient(135deg,#f85149,#f97316);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        .cblock{background:#0d1117;border:1px solid #21262d;border-radius:8px;padding:12px 16px;font-family:'JetBrains Mono',monospace;font-size:.76rem;line-height:1.65;color:var(--sub);overflow-x:auto;margin-bottom:14px;white-space:pre}
        .expl-box{background:rgba(88,166,255,.04);border:1px solid rgba(88,166,255,.1);border-radius:10px;padding:12px 16px;margin-top:10px}
        .expl-box p{font-size:.84rem;line-height:1.65;color:#8b949e}
        @media(max-width:640px){.sbox{min-width:78px;padding:10px 8px}}
    </style>
</head>

<script>
const D=[
// Section A
{id:1,s:'A',st:'C# & .NET Fundamentals',
q:'Which is immutable in C#?',
o:['StringBuilder allows in-place modification of string content','String is immutable meaning once created its value cannot be changed','List allows adding and removing elements dynamically','Array elements can be modified after creation'],a:1,
e:'String objects are immutable in C#. Any operation that appears to modify a string actually creates and returns a new string object.'},
{id:2,s:'A',st:'C# & .NET Fundamentals',
q:'Correct constructor syntax:',
o:['public ClassName() is the standard C# constructor syntax with access modifier and parentheses','ClassName public() has incorrect modifier placement','void ClassName() constructors cannot have a return type','static ClassName() is a static constructor not an instance constructor'],a:0,
e:'A constructor is declared with an access modifier, the class name, and parentheses. It has no return type, not even void.'},
{id:3,s:'A',st:'C# & .NET Fundamentals',
q:'Output of code:',
c:`double d = 10.6;\nint i = (int)d;\nConsole.WriteLine(i);`,
o:['10 because explicit cast truncates the decimal part','11 because it rounds to nearest integer','10.6 because the cast preserves the decimal value','Exception because double to int requires explicit handling'],a:0,
e:'Explicit casting from double to int truncates the fractional part. 10.6 becomes 10, not 11. No rounding occurs during the cast.'},
{id:4,s:'A',st:'C# & .NET Fundamentals',
q:'What is encapsulation?',
o:['Encapsulation is the practice of hiding internal data and exposing it through controlled methods or properties','Encapsulation refers to reusing code through inheritance','Encapsulation means an object can take many forms at runtime','Encapsulation is the mechanism of deriving classes from a base class'],a:0,
e:'Encapsulation bundles data and methods within a class and restricts direct access to internal state, typically using private fields with public properties.'},
{id:5,s:'A',st:'C# & .NET Fundamentals',
q:'Keyword used for method hiding:',
o:['new keyword hides the base class method in the derived class','override keyword provides virtual method implementation','virtual keyword enables method overriding in derived classes','abstract keyword forces derived classes to implement the method'],a:0,
e:'The new keyword is used for method hiding (shadowing). It replaces the base class method without using polymorphism — the method called depends on the reference type.'},
{id:6,s:'A',st:'C# & .NET Fundamentals',
q:'Output of following:',
c:`int x = 0;\ntry {\n    int y = 10 / x;\n} catch {\n    Console.WriteLine("Error");\n} finally {\n    Console.WriteLine("Done");\n}`,
o:['Error only is printed','Done only is printed','Error followed by Done are both printed','No output at all'],a:2,
e:'Division by zero throws DivideByZeroException. The catch block prints "Error", then the finally block always executes and prints "Done".'},
{id:7,s:'A',st:'C# & .NET Fundamentals',
q:'Default value of enum:',
o:['The default value of an enum is 0 corresponding to the first defined member','The default value is 1','The default value is null for enums','The default value is negative one'],a:0,
e:'Enums are value types backed by int. The default value is 0, which corresponds to the first member unless explicitly assigned different values.'},
{id:8,s:'A',st:'C# & .NET Fundamentals',
q:'Which allows multiple return values?',
o:['Tuple can return multiple values as a single grouped object','Array can return multiple values of the same type','ref parameter can return a value through the reference','All of the above options can be used to return multiple values from a method'],a:3,
e:'Tuple groups multiple values of different types. Arrays return multiple same-type values. ref/out parameters modify variables passed by reference. All achieve multiple returns.'},
{id:9,s:'A',st:'C# & .NET Fundamentals',
q:'What is polymorphism?',
o:['Polymorphism means an object can take many forms such as method overloading and overriding','Polymorphism means an object has only a single fixed form','Polymorphism is the practice of hiding data inside a class','Polymorphism refers to reusing code through class inheritance'],a:0,
e:'Polymorphism allows objects to be treated as instances of their base type while behaving differently. It manifests as compile-time (overloading) and runtime (overriding) polymorphism.'},
{id:10,s:'A',st:'C# & .NET Fundamentals',
q:'Purpose of params keyword:',
o:['params allows a method to accept a variable number of arguments','params enforces a fixed number of parameters','params makes a parameter pass by reference','params defines an output parameter'],a:0,
e:'The params keyword lets you pass a variable number of arguments to a method. It must be the last parameter and the arguments are automatically wrapped into an array.'},
{id:11,s:'A',st:'C# & .NET Fundamentals',
q:'Which is not allowed in interface?',
o:['Method declaration without body is allowed in interfaces','Field declarations are not allowed in interfaces','Property declarations with get and set are allowed in interfaces','Event declarations are allowed in interfaces'],a:1,
e:'Interfaces cannot contain fields (instance variables). They can only contain method signatures, properties, events, and indexers — all without implementation.'},
{id:12,s:'A',st:'C# & .NET Fundamentals',
q:'Output of this:',
c:`Console.WriteLine(string.IsNullOrEmpty(null));\nConsole.WriteLine(string.IsNullOrEmpty(""));`,
o:['True followed by True because null is null and empty string is considered empty','False followed by True','True followed by False','False followed by False'],a:0,
e:'IsNullOrEmpty returns true for both null (no reference) and "" (empty string). It is the standard way to check for missing or empty string values.'},
{id:13,s:'A',st:'C# & .NET Fundamentals',
q:'What does var infer?',
o:['var infers the type at compile time from the assigned value','var infers the type at runtime dynamically','var creates a dynamically typed variable','var creates a variable of type object'],a:0,
e:'var is implicitly typed — the compiler determines the type from the initialization expression at compile time. It is strongly typed, not dynamic.'},
{id:14,s:'A',st:'C# & .NET Fundamentals',
q:'Correct way to throw exception:',
o:['throw new Exception() creates and throws a new exception instance','Throw Exception is invalid syntax missing the new keyword','Exception e = new does not throw anything','raise Exception is not valid C# syntax'],a:0,
e:'Exceptions are thrown using the throw keyword followed by new to create an exception instance: throw new Exception("message"). The other syntaxes are invalid.'},
{id:15,s:'A',st:'C# & .NET Fundamentals',
q:'Which is value type?',
o:['DateTime is a struct and therefore a value type in C#','String is a reference type stored on the heap','Object is the base reference type for all classes','Class instances are always reference types'],a:0,
e:'DateTime is defined as a struct in .NET, making it a value type. It is stored on the stack (or inline) rather than on the heap.'},

// Section B
{id:16,s:'B',st:'C# Advanced Concepts',
q:'What is event?',
o:['Event implements a publisher-subscriber model where publishers notify subscribers when something happens','Event is simply a delegate variable','Event is a threading mechanism','Event is a type of collection'],a:0,
e:'An event is a wrapper around a delegate that adds publisher/subscriber encapsulation. External code can only subscribe (+=) or unsubscribe (-=) but cannot invoke the event directly.'},
{id:17,s:'B',st:'C# Advanced Concepts',
q:'LINQ method to check existence:',
o:['Any returns true if any element satisfies the condition','All returns true only if every element satisfies the condition','Contains checks if a specific value exists in the collection','First returns the first element or throws if empty'],a:0,
e:'Any() is the standard LINQ method to check if at least one element matches a predicate (or if the collection is non-empty when called without a predicate).'},
{id:18,s:'B',st:'C# Advanced Concepts',
q:'Purpose of FileStream:',
o:['FileStream provides byte-level read and write operations on files','FileStream works with text content only','FileStream operates only in memory without disk access','FileStream is used for database operations'],a:0,
e:'FileStream provides low-level byte-level file I/O. It can read and write raw bytes, making it suitable for any file type including binary files.'},
{id:19,s:'B',st:'C# Advanced Concepts',
q:'What does await do?',
o:['await suspends method execution until the awaited task completes without blocking the calling thread','await blocks the calling thread until the task finishes','await creates and starts a new background thread','await cancels the running task'],a:0,
e:'await asynchronously waits for a Task to complete. Instead of blocking the thread, it yields control back to the caller and resumes when the task finishes.'},
{id:20,s:'B',st:'C# Advanced Concepts',
q:'Output of code:',
c:`int[] arr = {1,2,3};\nforeach(var item in arr) {\n    item = 10;\n}`,
o:['Code compiles and runs without errors','Compile error because the foreach iteration variable is read-only','Runtime error when trying to modify the item','No change to the array values'],a:1,
e:'The iteration variable in a foreach loop is read-only. Attempting to assign to it (item = 10) causes a compile-time error CS1656.'},
{id:21,s:'B',st:'C# Advanced Concepts',
q:'What is dynamic keyword?',
o:['dynamic defers type checking to runtime instead of compile time','dynamic performs compile-time type checking like var','dynamic is a static type that cannot change at runtime','dynamic is the same as generic type parameters'],a:0,
e:'The dynamic type bypasses compile-time type checking. Operations on dynamic variables are resolved at runtime using the DLR (Dynamic Language Runtime).'},
{id:22,s:'B',st:'C# Advanced Concepts',
q:'Which collection is LIFO?',
o:['Stack follows Last-In First-Out order using Push and Pop operations','Queue follows First-In First-Out order','Dictionary stores key-value pairs for lookup','HashSet stores unique elements without ordering'],a:0,
e:'Stack<T> is LIFO: the last element pushed onto the stack is the first one popped off. Push adds to the top, Pop removes from the top.'},
{id:23,s:'B',st:'C# Advanced Concepts',
q:'Purpose of yield break:',
o:['yield break immediately ends the iterator and stops generating further elements','yield break continues to the next iteration of the loop','yield break returns a value from the iterator','yield break throws an exception to the caller'],a:0,
e:'yield break terminates the iterator method early. No more elements are yielded after this statement. It is the iterator equivalent of a return statement.'},
{id:24,s:'B',st:'C# Advanced Concepts',
q:'What is Monitor class used for?',
o:['Monitor provides thread synchronization through Enter and Exit methods for mutual exclusion','Monitor is used for creating and managing async tasks','Monitor handles file input and output operations','Monitor manages database connections and queries'],a:0,
e:'The Monitor class (used internally by the lock statement) provides synchronous access to a shared resource. Monitor.Enter acquires the lock, Monitor.Exit releases it.'},
{id:25,s:'B',st:'C# Advanced Concepts',
q:'Which is true for unsafe code?',
o:['Unsafe code in C# allows direct pointer manipulation like in C and C++','Unsafe code is fully managed with no special capabilities','Unsafe code provides no performance benefit over managed code','Unsafe code is the default mode in all C# programs'],a:0,
e:'Unsafe code blocks (marked with unsafe keyword) allow pointer operations, fixed-size buffers, and direct memory manipulation. It requires the /unsafe compiler flag.'},

// Section C
{id:26,s:'C',st:'ASP.NET Core MVC & Web API',
q:'Which is minimal API?',
o:['app.MapGet defines a minimal API endpoint without controllers or views','Controller-based approach requires full MVC setup','Razor Page is a page-based model not minimal API','View is a Razor template for rendering HTML'],a:0,
e:'Minimal APIs in ASP.NET Core use methods like MapGet, MapPost, etc. directly on WebApplication, eliminating the need for controllers, views, or routing configuration.'},
{id:27,s:'C',st:'ASP.NET Core MVC & Web API',
q:'Purpose of Program.cs:',
o:['Program.cs creates and configures the web host then builds and runs the application','Program.cs defines entity models for the database','Program.cs is a Razor layout file','Program.cs only stores configuration values'],a:0,
e:'In the minimal hosting model, Program.cs is the single entry point where the WebApplicationBuilder is configured, services are registered, middleware is set up, and the app is run.'},
{id:28,s:'C',st:'ASP.NET Core MVC & Web API',
q:'Attribute for required field:',
o:['Required attribute validates that a model property must have a non-null and non-empty value','Validate is not a built-in validation attribute in ASP.NET Core','Key attribute specifies a primary key not a required field','MaxLength sets maximum string length but does not make it required'],a:0,
e:'[Required] is a validation attribute that ensures the property has a value. On the client side it enables HTML5 required validation, and on the server it adds a ModelState error.'},
{id:29,s:'C',st:'ASP.NET Core MVC & Web API',

let ua={},rv={},sec=3600,ti=null,fin=false;
const L=['A','B','C','D'];
const $=id=>document.getElementById(id);
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function build(){
    let h='',ls='';
    D.forEach(q=>{
        if(q.s!==ls){ls=q.s;h+=`<div class="flex items-center gap-4 mt-10 mb-5"><div class="sline"></div><span class="slabel">Section ${q.s}: ${q.st}</span><div class="sline"></div></div>`}
        let ch=q.c?`<div class="cblock">${esc(q.c)}</div>`:'';
        let oh=q.o.map((o,i)=>`<button class="obtn" data-q="${q.id}" data-o="${i}" onclick="pick(${q.id},${i})"><span class="olbl">${L[i]}</span><span>${esc(o)}</span></button>`).join('');
        h+=`<div class="qcard p-5 sm:p-7 mb-4" id="qc-${q.id}">
            <div class="flex items-start justify-between gap-3 mb-4">
                <p class="text-white font-medium text-sm sm:text-base leading-relaxed">${esc(q.q)}</p>
                <span class="qnum">Q${q.id}</span>
            </div>
            ${ch}
            <div class="grid gap-2.5 mb-4" id="op-${q.id}">${oh}</div>
            <div class="flex items-center justify-between">
                <button class="rbtn" id="rb-${q.id}" onclick="reveal(${q.id})"><i class="fa-solid fa-eye mr-1.5"></i>Show Answer</button>
                <span class="text-xs font-mono" style="color:var(--muted)" id="st-${q.id}"></span>
            </div>
            <div class="apanel" id="ap-${q.id}">
                <div class="rounded-xl px-4 py-3 flex items-center gap-3" style="background:rgba(16,185,129,.06);border:1px solid rgba(16,185,129,.12)">
                    <div class="w-7 h-7 rounded-md flex items-center justify-center flex-shrink-0" style="background:rgba(16,185,129,.15)"><i class="fa-solid fa-check text-emerald-400 text-xs"></i></div>
                    <div><span class="text-emerald-400 font-semibold text-sm">Correct Answer: </span><span class="text-white text-sm font-medium" id="at-${q.id}"></span></div>
                </div>
                <div class="expl-box"><p><i class="fa-solid fa-lightbulb text-amber-400/70 mr-2"></i>${esc(q.e)}</p></div>
            </div>
        </div>`;
    });
    $('qc').innerHTML=h;
    $('dots').innerHTML=D.map(q=>`<button class="ndot" id="d-${q.id}" title="Q${q.id}" onclick="sc(${q.id})"></button>`).join('');
}

function pick(qi,oi){
    if(fin||rv[qi])return;
    ua[qi]=oi;
    document.querySelectorAll(`[data-q="${qi}"]`).forEach((b,i)=>{b.classList.toggle('pk',i===oi)});
    stats();
}

function reveal(qi){
    if(rv[qi])return;
    rv[qi]=true;
    const q=D.find(x=>x.id===qi);
    const card=$(`qc-${qi}`),btn=$(`rb-${qi}`),st=$(`st-${qi}`),ap=$(`ap-${qi}`);
    $(`at-${qi}`).textContent=`${L[q.a]}. ${q.o[q.a]}`;
    ap.classList.add('open');
    btn.classList.add('used');
    btn.innerHTML='<i class="fa-solid fa-eye-slash mr-1.5"></i>Revealed';
    document.querySelectorAll(`[data-q="${qi}"]`).forEach((b,i)=>{
        b.classList.remove('pk');b.classList.add('lk');
        if(i===q.a)b.classList.add('yes');
        else if(i===ua[qi]&&ua[qi]!==q.a)b.classList.add('nah');
    });
    if(ua[qi]!==undefined){
        if(ua[qi]===q.a){card.classList.add('ok');st.innerHTML='<span class="text-emerald-400"><i class="fa-solid fa-circle-check mr-1"></i>Correct</span>'}
        else{card.classList.add('no');st.innerHTML='<span class="text-red-400"><i class="fa-solid fa-circle-xmark mr-1"></i>Wrong</span>'}
    }else{st.innerHTML='<span style="color:var(--muted)"><i class="fa-solid fa-circle-minus mr-1"></i>Skipped</span>'}
    const dot=$(`d-${qi}`);
    if(dot){dot.classList.remove('dn');if(ua[qi]!==undefined&&ua[qi]===q.a)dot.classList.add('dc');else if(ua[qi]!==undefined)dot.classList.add('dw')}
    stats();
}

function sc(qi){const el=$(`qc-${qi}`);if(el)el.scrollIntoView({behavior:'smooth',block:'center'})}

function stats(){
    let c=0,w=0,n=0;
    D.forEach(q=>{if(rv[q.id]){n++;if(ua[q.id]!==undefined){if(ua[q.id]===q.a)c++;else w++}}});
    $('hC').textContent=c;$('hW').textContent=w;$('hS').textContent=40-n;
    $('pf').style.width=`${(n/40)*100}%`;
}

function startT(){
    sec=3600;upT();
    ti=setInterval(()=>{sec--;if(sec<=0){sec=0;clearInterval(ti);submit()}upT()},1000);
}
function upT(){
    const m=Math.floor(sec/60),s=sec%60;
    $('tmr').textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    if(sec<=300)$('tmr').classList.add('tw');else $('tmr').classList.remove('tw');
}

function submit(){
    if(fin)return;fin=true;clearInterval(ti);
    D.forEach(q=>{if(!rv[q.id])reveal(q.id)});
    let c=0,w=0,sk=0;
    D.forEach(q=>{if(ua[q.id]!==undefined){if(ua[q.id]===q.a)c++;else w++}else sk++});
    const pct=Math.round((c/40)*100);
    let g='F';if(pct>=90)g='A+';else if(pct>=80)g='A';else if(pct>=70)g='B+';else if(pct>=60)g='B';else if(pct>=50)g='C';else if(pct>=40)g='D';
    const ge=$('rG');ge.textContent=g;ge.className=pct<40?'gtxt gfail mb-1':'gtxt mb-1';
    $('rP').textContent=`${pct}% — ${c}/40 marks`;
    $('rC').textContent=c;$('rW').textContent=w;$('rS').textContent=sk;
    setTimeout(()=>$('resM').classList.remove('hidden'),300);
}

function revealAll(){
    D.forEach(q=>{if(!rv[q.id])reveal(q.id)});
    const b=$('raBtn');b.innerHTML='<i class="fa-solid fa-eye-slash mr-1"></i> All Revealed';b.style.color='#3fb950';
}

function reset(){
    ua={};rv={};fin=false;clearInterval(ti);
    $('resM').classList.add('hidden');
    const b=$('raBtn');b.innerHTML='<i class="fa-solid fa-eye mr-1"></i> Reveal All';b.style.color='var(--muted)';
    build();stats();spy();startT();window.scrollTo({top:0,behavior:'smooth'});
}

function spy(){
    const obs=new IntersectionObserver(es=>{
        es.forEach(e=>{if(e.isIntersecting){
            const qi=parseInt(e.target.id.replace('qc-',''));
            document.querySelectorAll('.ndot').forEach(d=>d.classList.remove('dn'));
            const dot=$(`d-${qi}`);if(dot&&!dot.classList.contains('dc')&&!dot.classList.contains('dw'))dot.classList.add('dn');
        }});
    },{rootMargin:'-30% 0px -60% 0px'});
    D.forEach(q=>{const el=$(`qc-${q.id}`);if(el)obs.observe(el)});
}

 $('goBtn').addEventListener('click',()=>{$('startM').classList.add('hidden');$('app').classList.remove('hidden');build();stats();spy();startT()});
 $('subBtn').addEventListener('click',submit);
 $('raBtn').addEventListener('click',revealAll);
 $('rstBtn').addEventListener('click',reset);
 $('revBtn').addEventListener('click',()=>$('resM').classList.add('hidden'));
document.addEventListener('keydown',e=>{if(e.key==='Escape'&&!$('resM').classList.contains('hidden'))$('resM').classList.add('hidden')});
</script>
</body>
